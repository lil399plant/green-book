      {id:"normal_moments", title:"Moments of normal distribution", statement:"For X ~ N(0,σ²), what are E[X²], E[X³], and E[X⁴]?", hint:"Odd moments vanish; even moments follow (n−1)!! σⁿ.", solution:"E[X²]=σ², E[X³]=0, E[X⁴]=3σ⁴. Odd central moments are 0 by symmetry; even moments are (n−1)!!·σⁿ, so the 4th is 3·σ⁴."}
    ]},
    { id:"4.5", title:"Expected Value, Variance & Covariance", expl:"Linearity of expectation is the single most useful fact in the book: E[X+Y] = E[X] + E[Y] regardless of dependence, so you can decompose a hard total into indicator variables and add their probabilities. It gives the expected number of loops when tying noodle ends as a sum of 1/(2k-1), and the coupon-collector time as n times the harmonic number. Variance and covariance measure spread and co-movement, with Var(X +/- Y) = Var(X) + Var(Y) +/- 2 Cov(X,Y), reducing to a plain sum under independence. The variance-minimizing hedge is h = Cov(A,B)/Var(B), the beta of A on B, obtained by differentiating the hedged variance. Reach for indicators and linearity first; only compute joint distributions when a genuinely nonlinear quantity forces you to.", probs:[
      {id:"connecting_noodles", title:"Connecting noodles", statement:"You have 100 noodles in a bowl. You repeatedly tie two random noodle ends together (from the 200 ends) until no ends remain. What's the expected number of loops formed?", hint:"At each tie, there's a small chance you close a loop; sum the probabilities.", solution:"Σ_{k=1}^{100} 1/(2k−1) ≈ 3.28. With 2n ends, the first tie closes a loop with prob 1/(2n−1); by linearity of expectation, expected loops = Σ 1/(2k−1) over k=1..n. For n=100 this is ≈3.28."},
      {id:"optimal_hedge", title:"Optimal hedge ratio", statement:"You hold asset A and hedge with asset B. What position h in B minimizes the variance of (A − hB)?", hint:"Differentiate Var(A − hB) with respect to h.", solution:"h* = Cov(A,B)/Var(B) = ρ·σ_A/σ_B. Minimizing Var(A) − 2h Cov(A,B) + h²Var(B) gives h* = Cov(A,B)/Var(B). This is the beta of A on B."},
      {id:"dice_game_45", title:"Dice game", statement:"You roll a die; you may keep the value as your payoff or re-roll (up to some rounds). With one optional re-roll, what's the expected payoff under optimal play?", hint:"Re-roll only when the current face is below the expected re-roll value.", solution:"4.25. The re-roll's expected value is 3.5, so keep a 4, 5, or 6 and re-roll on 1,2,3. E = (1/2)(average of 4,5,6=5) + (1/2)(3.5) = 2.5 + 1.75 = 4.25."},
      {id:"card_game_45", title:"Card game", statement:"You draw cards from a shuffled deck; each red card pays +$1, each black −$1. You may stop any time. What's the value of the optimal stopping strategy?", hint:"This is a random walk that ends at 0; think about the optimal-stopping premium.", solution:"About $2.62. The count of remaining reds minus blacks is a martingale ending at 0, but optimal stopping lets you quit while ahead. The exact value is Σ over states of the positive expected surplus; numerically the optimal expected gain for a 52-card deck is roughly $2.62."},
      {id:"sum_random_vars", title:"Sum of random variables", statement:"X and Y are independent with variances σ_X² and σ_Y². What are Var(X+Y) and Var(X−Y)? What if they're correlated with covariance c?", hint:"Var(aX+bY) = a²Var(X)+b²Var(Y)+2ab·Cov.", solution:"Independent: Var(X±Y) = σ_X² + σ_Y² (covariance zero). Correlated: Var(X+Y)=σ_X²+σ_Y²+2c and Var(X−Y)=σ_X²+σ_Y²−2c."},
      {id:"coupon_collection", title:"Coupon collection", statement:"Each cereal box contains one of n equally likely coupons. What's the expected number of boxes to collect all n?", hint:"Sum geometric waiting times for each new coupon.", solution:"n·Hₙ = n(1 + 1/2 + … + 1/n) ≈ n ln n + γn. After having k distinct coupons, the wait for a new one is geometric with success (n−k)/n, mean n/(n−k); sum over k."},
      {id:"joint_default", title:"Joint default probability", statement:"Two bonds each default with probability p, with default correlation ρ. What's the probability both default?", hint:"Use Cov = ρ·√(Var·Var) for the two Bernoulli indicators.", solution:"P(both) = p² + ρ·p(1−p). Each indicator has variance p(1−p); Cov = ρ·p(1−p) = E[XY] − p². So E[XY] = P(both) = p² + ρp(1−p)."}
    ]},
    { id:"4.6", title:"Order Statistics", expl:"Order statistics describe what happens when you sort a sample and ask about the extremes or the k-th value. For n independent uniforms on the unit interval, the k-th smallest has mean k/(n+1), so the minimum averages 1/(n+1) and the maximum n/(n+1). The correlation between the min and max is positive for small n and decays toward zero as the sample grows and the extremes decouple. The random-ants-on-a-stick classic is solved by the relabeling insight that two colliding ants reversing direction is indistinguishable from them passing through each other, so the last exit time is just the longest straight walk to an end. When a problem is about maxima, minima, or first and last events, think in terms of the ordered sample rather than the raw one.", probs:[
      {id:"ev_max_min", title:"Expected value of max and min", statement:"Draw n independent Uniform(0,1) samples. What are the expected values of the minimum and maximum?", hint:"The k-th order statistic of n uniforms has mean k/(n+1).", solution:"E[min] = 1/(n+1), E[max] = n/(n+1). The k-th smallest of n uniforms has mean k/(n+1); set k=1 and k=n."},
      {id:"corr_max_min", title:"Correlation of max and min", statement:"For n Uniform(0,1) samples, is the correlation between the min and max positive or negative, and roughly how does it behave as n grows?", hint:"For large n min and max become nearly independent.", solution:"Positive but small, →0 as n→∞. For fixed n there's a positive correlation (both drift with the sample), computable from the joint density of order statistics; for n=2 it works out to 1/2, decreasing toward 0 as the extremes decouple with more data."},
      {id:"random_ants", title:"Random ants", statement:"Several ants on a stick each move left or right at the same speed; when two collide they reverse direction. When does the last ant leave the stick?", hint:"Colliding ants passing 'through' each other is indistinguishable from bouncing.", solution:"Treat collisions as ants passing through each other (relabeling). Then each 'phantom' ant just walks off in a straight line, so the last departure time equals the maximum over ants of the time to walk off in its initial direction — max distance to the near end, over all ants. Collisions don't change when the stick clears."}
    ]}
  ]
},
{
  id:"ch5", num:"5", title:"Stochastic Process and Stochastic Calculus",
  blurb:"This chapter is about processes that evolve with randomness over time. Four toolkits dominate: Markov chains (the future depends only on the present state), martingales and random walks (fair-game arguments and the optional stopping theorem), dynamic programming (solve backward from the end), and Brownian motion with Itô calculus (the continuous limit underlying derivative pricing). Conditioning on the next step and looking for a martingale are the two habits to build.",
  subs:[
    { id:"5.1", title:"Markov Chain", expl:"A Markov chain is a process whose next state depends only on the current state, not the full history, which lets you replace time with a transition structure. Set up the states and transition probabilities, mark absorbing states for ruin-type questions, and solve the resulting linear equations; the gambler-s-ruin hitting probability satisfies a harmonic (linear) recurrence and equals k/N for a fair game. Long-run behavior comes from renewal or stationary arguments, so the probability a running die-sum ever hits a distant integer tends to 1 over the mean step, namely 2/7. Penney-s-game triplets are the cautionary tale: which pattern appears first is non-transitive and is not decided by each pattern-s standalone waiting time, so you must analyze the head-to-head chain. And reinforcement processes like the Polya urn converge to a random limit rather than a fixed one.", probs:[
      {id:"gamblers_ruin_51", title:"Gambler's ruin problem", statement:"A gambler bets $1 on a fair coin, starting at $k, aiming for $N, ruined at $0. Set this up as a Markov chain and find the probability of reaching N.", hint:"States 0..N; boundaries absorbing; hitting probability is harmonic (linear).", solution:"k/N. The states 0,...,N form a Markov chain with absorbing barriers at 0 and N. The hitting probability h(k) satisfies h(k)=½h(k−1)+½h(k+1), a linear (harmonic) equation with h(0)=0, h(N)=1, giving h(k)=k/N."},
      {id:"dice_question", title:"Dice question", statement:"You roll a fair die repeatedly and sum the results. What's the probability the running sum ever exactly equals a large number n, as n→∞?", hint:"Long-run fraction of 'landed-on' totals equals 1 over the average step.", solution:"2/7. The expected step is 3.5, so in the long run the running sum hits a fraction 1/3.5 = 2/7 of all integers. By renewal theory, P(sum ever equals n) → 1/E[step] = 2/7."},
      {id:"coin_triplets", title:"Coin triplets", statement:"In a fair-coin sequence, is HHT more likely to appear before HTT, or are all triplets symmetric? (Penney's game)", hint:"Triplet races are non-transitive; compute head-to-head via Conway's leading numbers.", solution:"Penney's game is non-transitive: for any triplet an opponent can choose one that beats it more than half the time. For example, HTH vs THH: THH wins 3/4 of the time. The lesson is that 'which pattern comes first' is not decided by each pattern's standalone waiting time — you must compute the head-to-head via Markov/Conway analysis."},
      {id:"color_balls", title:"Color balls", statement:"An urn has some white and black balls. You repeatedly remove a ball and, by some rule, add/replace; track the long-run composition (a Markov/absorbing analysis). For the classic version: urn with 1 white, 1 black; draw one, return it with another of the same color (Pólya urn). What's the long-run fraction white?", hint:"Pólya urn: the limiting fraction is a random variable, uniform on (0,1).", solution:"For the Pólya urn starting 1 white / 1 black, the fraction of white converges to a Uniform(0,1) random variable — every limiting proportion is equally likely. The reinforcement (add same color) makes early luck persist, so there's no single deterministic limit."}
    ]},
    { id:"5.2", title:"Martingale and Random Walk", expl:"A martingale is a fair game whose expected future value equals its present value, and spotting one hands you answers with almost no computation via the optional stopping theorem. It underlies the symmetric random walk, the fairness of gambler-s-ruin, and the ballot problem. Random-walk recurrence depends on dimension: a walker returns to the origin with certainty in one and two dimensions but only about 34 percent of the time in three, the drunk-man-versus-drunk-bird result. Pattern-waiting times reveal why structure matters: the expected wait for HT is 4 but for HH is 6, because HH loses its progress on a mismatch while HT does not, and the ABRACADABRA martingale makes this precise by pricing overlaps. Before grinding state equations, ask whether some quantity is a martingale and whether the stopping time is nice enough to apply the theorem.", probs:[
      {id:"drunk_man", title:"Drunk man", statement:"A drunk man on a number line steps +1 or −1 with equal probability each second, starting at 0. Will he return to 0 with probability 1? What about in 2D and 3D?", hint:"Recurrence depends on dimension.", solution:"Yes in 1D and 2D (recurrent — returns with probability 1), but transient in 3D (returns with probability ≈0.34). Pólya's theorem: 'a drunk man finds his way home, but a drunk bird may not.'"},
      {id:"dice_game_52", title:"Dice game", statement:"You roll a die; you get paid the face value and can stop or pay $1 to roll again indefinitely. Using a martingale/optimal-stopping view, what's the fair value?", hint:"Set value V = max(keep, −1 + E[next state]).", solution:"Roll again while the current face is below the continuation value. The continuation value V solves V = −1 + E[max(face, V)]. Solving, the optimal policy keeps a 5 or 6 and rerolls otherwise, giving a fair value around 6 (approximately 5.83 depending on cost structure). The method is to equate the value to its optional-stopping fixed point."},
      {id:"ticket_line", title:"Ticket line", statement:"At a box office, n people have $5 bills and n have $10 bills, arriving in random order; tickets cost $5 and change must be given from collected $5s. What's the probability the line never gets stuck?", hint:"This is the ballot/Catalan problem.", solution:"1/(n+1). The number of valid orderings is the Catalan number Cₙ = C(2n,n)/(n+1) out of C(2n,n) equally likely arrangements, so the probability the seller can always make change is Cₙ/C(2n,n) = 1/(n+1)."},
      {id:"coin_sequence", title:"Coin sequence", statement:"What's the expected number of fair-coin flips to first see the pattern HH? And to first see HT? Why do they differ?", hint:"HH can 'lose progress'; HT cannot. Use martingale/ABRACADABRA or state equations.", solution:"E[HT] = 4, E[HH] = 6. HT: once you get an H, any T finishes; states give E=4. HH: a T after the first H resets progress, costing more; E=6. The difference arises from overlap/self-correlation of the pattern (the ABRACADABRA martingale makes this precise)."}
    ]},
    { id:"5.3", title:"Dynamic Programming", expl:"Dynamic programming solves a problem by breaking it into overlapping subproblems and working backward from the end, storing each answer once. It applies when a problem has optimal substructure (an optimal solution is built from optimal sub-solutions) and reused subproblems, as in grid shortest paths where each cell is its own cost plus the min of its predecessors. Optimal-stopping games are DP with a keep-or-continue choice at every state: define a value function equal to the max of stopping now versus the expected value of continuing, then fill the table. Rolling a die with up to three tries gives an expected 4.67 under the thresholds 5-then-4, and the red-black card game is valued by the recursion V(r,b) = max((r-b)/(r+b), the probability-weighted average of the children). The craft is defining the state so the recursion is both correct and small.", probs:[
      {id:"dp_algorithm", title:"Dynamic programming (DP) algorithm", statement:"Explain the two ingredients that make a problem solvable by dynamic programming, and illustrate with the shortest-path-on-a-grid idea.", hint:"Optimal substructure + overlapping subproblems.", solution:"DP needs optimal substructure (an optimal solution is built from optimal solutions of subproblems) and overlapping subproblems (the same subproblems recur, so we memoize). Grid shortest path: cost(i,j) = grid(i,j) + min(cost(i−1,j), cost(i,j−1)), filled bottom-up so each cell is computed once."},
      {id:"dice_game_53", title:"Dice game", statement:"You may roll a die up to 3 times, keeping the value of whichever roll you stop on. What's the expected value under optimal play?", hint:"Work backward: value of the last roll is 3.5; use it as the threshold for the earlier rolls.", solution:"≈4.67. Last roll worth 3.5, so on the 2nd roll keep ≥4, giving E₂ = (1/2)(5) + (1/2)(3.5) = 4.25. On the 1st roll keep ≥5, giving E₁ = (2/6)(5.5) + (4/6)(4.25) = 4.667."},
      {id:"world_series", title:"World series", statement:"Two evenly matched teams play a best-of-7 series. What's the probability it goes to a deciding game 7?", hint:"Game 7 happens iff the teams are 3-3 after six games.", solution:"C(6,3)/2⁶ = 20/64 = 5/16. A game 7 requires exactly a 3-3 split after six games: C(6,3)=20 ways, each with probability (1/2)⁶."},
      {id:"dynamic_dice_game", title:"Dynamic dice game", statement:"You roll a die repeatedly, accumulating the sum, but if you ever roll a 1 you lose everything banked this round. You may bank and stop anytime. What's the optimal stopping rule?", hint:"Compare expected gain from another roll to the risk of busting.", solution:"Stop when your banked total is high enough that the expected loss from a bust exceeds the expected gain. Rolling again gains (2+3+4+5+6)/6 = 20/6 on non-1 faces but risks losing the whole bank with prob 1/6. Continue while (1/6)·bank < (5/6)·(average gain 4) ⇒ roughly stop once bank exceeds ~20. The exact threshold comes from V = max(bank, (5/6)(V+4) )."},
      {id:"dynamic_card_game", title:"Dynamic card game", statement:"A deck has 26 red and 26 black. You flip cards one at a time and may say 'stop'; you win $1 if the NEXT card is red, lose $1 if black. What's the value of the game with optimal play (revisited via DP)?", hint:"Define V(r,b) = value with r reds and b blacks left; recurse.", solution:"≈$2.62. Let V(r,b) be the optimal value with r reds, b blacks remaining. V(r,b) = max( (r−b)/(r+b),  [r·V(r−1,b) + b·V(r,b−1)]/(r+b) ), with V(r,0)=1. Filling the table for (26,26) yields about $2.62 — you should keep flipping while continuation beats the immediate edge (r−b)/(r+b)."}
    ]},
    { id:"5.4", title:"Brownian Motion and Stochastic Calculus", expl:"Brownian motion is the continuous-time limit of a random walk and the engine of derivative pricing. Standard Brownian motion starts at zero, has independent Gaussian increments with variance equal to the elapsed time, and continuous paths, so E[W_t] = 0, Var(W_t) = t, and Cov(W_s, W_t) = min(s,t). Ito-s lemma is ordinary calculus plus a correction: for a function of W it adds one half times the second derivative times dt, so d(W^2) = 2W dW + dt and E[e^(sigma W_t)] = e^(sigma^2 t / 2), the lognormal identity behind Black-Scholes. First-passage results mirror the discrete gambler-s ruin: the probability of hitting a before -b is b/(a+b), yet the expected time to hit a single level is infinite even though it is reached with certainty. Keep the Ito correction term in mind, since dropping it is the most common error.", probs:[
      {id:"brownian_motion", title:"Brownian motion", statement:"State the defining properties of standard Brownian motion Wₜ, and give E[Wₜ], Var(Wₜ), and Cov(Wₛ,Wₜ).", hint:"Independent Gaussian increments starting at 0.", solution:"W₀=0; independent increments; Wₜ−Wₛ ~ N(0, t−s); continuous paths. Thus E[Wₜ]=0, Var(Wₜ)=t, and Cov(Wₛ,Wₜ)=min(s,t)."},
      {id:"stopping_time", title:"Stopping time / first passage time", statement:"For standard Brownian motion, what's the expected time to first hit level a > 0? And the probability of hitting a before −b?", hint:"Hitting one of two levels is the continuous gambler's ruin; expected hit time of a single level is infinite.", solution:"P(hit a before −b) = b/(a+b) (continuous gambler's ruin, by the martingale Wₜ). The expected time to reach two-sided barrier is a·b. But the expected time to hit a single level a is infinite, even though it's hit with probability 1 — a hallmark of the heavy-tailed first-passage distribution."},
      {id:"itos_lemma", title:"Itô's lemma", statement:"Apply Itô's lemma to f(Wₜ) = Wₜ² and to f = e^{σWₜ}. What are the drift terms?", hint:"df = f' dW + ½ f'' dt for a function of Brownian motion.", solution:"For Wₜ²: d(Wₜ²) = 2Wₜ dWₜ + dt (the extra dt is the Itô correction, so E[Wₜ²]=t). For e^{σWₜ}: d(e^{σW}) = σe^{σW}dW + ½σ²e^{σW}dt, so E[e^{σWₜ}] = e^{½σ²t} — the lognormal/MGF identity central to Black–Scholes."}
    ]}
  ]
},
{
  id:"ch6", num:"6", title:"Finance",
  blurb:"Finance turns the probability and calculus machinery onto markets. The essentials: how option prices respond to their inputs, the no-arbitrage relationships like put–call parity, the Black–Scholes–Merton framework, the Greeks that measure sensitivities, the exotic payoffs built from vanilla blocks, and portfolio-level tools like VaR, duration, and the CAPM. Arbitrage arguments and replication are the recurring logic — if two portfolios pay the same, they cost the same.",
  subs:[
    { id:"6.1", title:"Option Pricing", expl:"Option pricing is built on no-arbitrage and replication: if two portfolios pay the same in every future state, they must cost the same today. That single principle gives put-call parity, C - P = S - K e^(-rT), with no assumption about volatility, because a long call and short put replicate a forward. It also tells you never to exercise an American call early on a non-dividend stock (you would throw away time value and the interest on the strike) while an American put can be worth exercising early. Black-Scholes-Merton comes from delta-hedging an option so the random dW term cancels, forcing the hedged portfolio to earn the risk-free rate and yielding the pricing PDE and the closed-form call S N(d1) - K e^(-rT) N(d2), where N(d2) is the risk-neutral probability of finishing in the money. Reason by building a replicating or hedged portfolio first, then let no-arbitrage pin the price.", probs:[
      {id:"price_direction", title:"Price direction of options", statement:"How does the price of a European call change as each input rises: spot, strike, volatility, time to maturity, and interest rate?", hint:"Sign each partial derivative (the Greeks).", solution:"Call rises with spot (Δ>0), volatility (vega>0), interest rate (rho>0), and usually time; it falls as strike rises. A put rises with strike and vol, falls with spot. Higher vol helps both calls and puts because optionality benefits from dispersion."},
      {id:"put_call_parity", title:"Put-call parity", statement:"Derive the relationship between a European call and put with the same strike K and maturity T.", hint:"Compare a portfolio of call minus put to a forward.", solution:"C − P = S − K·e^{−rT}. A long call plus short put replicates a forward: at expiry it pays S−K regardless of outcome. No-arbitrage forces the present values to match, giving put–call parity. It requires no volatility assumption — pure replication."},
      {id:"american_european", title:"American v.s. European options", statement:"Should you ever exercise an American call on a non-dividend-paying stock early? What about a put?", hint:"Compare exercising now to selling the option / the interest on the strike.", solution:"Never exercise an American call early on a non-dividend stock — you'd forfeit time value and the interest on the strike; better to sell it. American puts, however, can be optimal to exercise early (deep in the money) because you receive K now and earn interest on it. Dividends can also make early call exercise optimal just before the ex-date."},
      {id:"bsm_pde", title:"Black-Scholes-Merton differential equation", statement:"State the Black–Scholes PDE and explain how it's derived via a hedged portfolio.", hint:"Delta-hedge a short option to remove the dW term.", solution:"∂V/∂t + ½σ²S²∂²V/∂S² + rS∂V/∂S − rV = 0. Form a portfolio short one option and long Δ=∂V/∂S shares; the dW risk cancels, so the portfolio is riskless and must earn r. Equating its return to r and applying Itô yields the PDE, independent of the stock's real drift."},
      {id:"bs_formula", title:"Black-Scholes formula", statement:"Write the Black–Scholes price of a European call and identify what N(d₁) and N(d₂) mean.", hint:"C = S·N(d₁) − K e^{−rT} N(d₂).", solution:"C = S·N(d₁) − K e^{−rT} N(d₂), with d₁ = [ln(S/K)+(r+σ²/2)T]/(σ√T), d₂ = d₁ − σ√T. N(d₂) is the risk-neutral probability of finishing in the money; N(d₁) is the option's delta and relates to the expected in-the-money stock value."}
    ]},
    { id:"6.2", title:"The Greeks", expl:"The Greeks are the partial derivatives of an option-s value with respect to its inputs, and they are how desks understand and hedge risk. Delta is sensitivity to spot, equal to N(d1) for a call and N(d1) - 1 for a put, and delta-hedging removes first-order price risk. Gamma is the rate of change of delta, largest near the money and near expiry; a delta-hedged long option has positive gamma and profits from large moves in either direction. Theta is time decay, usually negative for long options, and vega is sensitivity to volatility, positive for both vanilla calls and puts because more dispersion helps a convex payoff. The unifying relationship, straight from the Black-Scholes PDE, is that positive gamma is paid for by negative theta: convexity has a rent, and time decay is that rent.", probs:[
      {id:"delta", title:"Delta", statement:"Define delta and give the delta of a European call and put. What does delta-hedging accomplish?", hint:"Delta = ∂V/∂S = N(d₁) for a call.", solution:"Delta = ∂V/∂S. Call delta = N(d₁) ∈ (0,1); put delta = N(d₁) − 1 ∈ (−1,0). Holding −Δ of the underlying against the option removes first-order price risk, making the position locally insensitive to small spot moves."},
      {id:"gamma", title:"Gamma", statement:"Define gamma and explain why a delta-hedged option position still makes or loses money as the stock moves.", hint:"Gamma = ∂²V/∂S²; it measures how delta itself changes.", solution:"Gamma = ∂²V/∂S² = ∂Δ/∂S. A long-option, delta-hedged position has positive gamma: it profits from large moves in either direction (you rehedge by buying low/selling high) but pays theta (time decay) as the cost. Gamma is largest near the money and near expiry."},
      {id:"theta", title:"Theta", statement:"Define theta and describe the relationship between theta and gamma for a delta-hedged option.", hint:"The BS PDE ties theta, gamma, and the risk-free return together.", solution:"Theta = ∂V/∂t (usually negative for long options — value decays with time). For a delta-hedged book the BS PDE gives θ ≈ −½σ²S²Γ (plus the carry term): positive gamma is 'paid for' by negative theta. Time decay is the price of convexity."},
      {id:"vega", title:"Vega", statement:"Define vega and explain why both calls and puts have positive vega.", hint:"Vega = ∂V/∂σ; more volatility widens the payoff distribution.", solution:"Vega = ∂V/∂σ > 0 for vanilla calls and puts. Higher volatility fattens the tails of the terminal price distribution; since option payoffs are convex (capped downside, open upside), more dispersion raises expected payoff, so both calls and puts gain value."}
    ]},
    { id:"6.3", title:"Option Portfolios and Exotic Options", expl:"Exotic and multi-leg positions are assembled from vanilla building blocks, so price and reason about them by decomposition. A bull call spread (long a low strike, short a higher one) caps both cost and payoff and expresses a bounded directional view. A straddle (long a call and a put at the same strike) is a pure volatility bet that profits from a big move in either direction and bleeds if the underlying sits still. A cash-or-nothing binary is just the discounted risk-neutral probability of finishing in the money, e^(-rT) N(d2), and equals the limit of an infinitely tight call spread. An exchange option to swap one asset for another follows Margrabe-s formula, priced like a Black-Scholes call whose volatility is that of the ratio, sqrt(sigma_A^2 + sigma_B^2 - 2 rho sigma_A sigma_B), with the interest rate dropping out. Always ask which simple payoffs sum to the exotic in front of you.", probs:[
      {id:"bull_spread", title:"Bull spread", statement:"Construct a bull call spread and describe its payoff and why a trader uses it.", hint:"Long a lower-strike call, short a higher-strike call.", solution:"Buy a call at strike K₁, sell a call at higher strike K₂ (same expiry). Payoff rises from 0 to (K₂−K₁) as spot goes from K₁ to K₂, then caps. It's a cheaper, capped bullish bet — you give up upside beyond K₂ to reduce the premium paid."},
      {id:"straddle", title:"Straddle", statement:"What is a straddle and what view does it express?", hint:"Long a call and a put at the same strike.", solution:"Long a call plus a long put at the same strike and expiry. It profits from a large move in either direction (long volatility) and loses if the stock stays near the strike. Used to bet on volatility/big news regardless of direction."},
      {id:"binary_options", title:"Binary options", statement:"Price a European cash-or-nothing binary call paying $1 if S_T > K. How does it relate to the vanilla call?", hint:"It's e^{−rT} times the risk-neutral probability of finishing above K.", solution:"Price = e^{−rT} N(d₂). A binary call is the discounted risk-neutral probability of ending in the money. It equals −∂C/∂K of the vanilla call (a tight call spread converges to a binary as the strikes merge)."},
      {id:"exchange_options", title:"Exchange options", statement:"An exchange option lets you swap asset B for asset A at expiry (payoff max(A−B,0)). What determines its price? (Margrabe)", hint:"Only the volatility of the ratio A/B matters, not the riskless rate.", solution:"Margrabe's formula: price it like a Black–Scholes call with 'spot' A, 'strike' B, zero rate, and volatility σ = √(σ_A² + σ_B² − 2ρσ_Aσ_B) — the vol of the ratio. The interest rate drops out because both legs are traded assets; correlation between A and B is the key input."}
    ]},
    { id:"6.4", title:"Other Finance Questions", expl:"This section gathers portfolio-level and rates tools. Mean-variance optimization trades expected return against variance; the efficient frontier is the set of minimum-variance portfolios per return, and adding a risk-free asset makes the best risky mix the tangency (maximum-Sharpe) portfolio, so everyone holds that plus cash (two-fund separation). Value at Risk is a quantile of the loss distribution but ignores how bad the tail beyond it is and is not sub-additive, weaknesses that expected shortfall (the average loss beyond VaR) repairs. Bond duration is the first-order price sensitivity to yield and convexity is the second-order correction, so price change is approximately minus duration times delta-y plus one half convexity times delta-y squared. Forward prices come from cash-and-carry, F = S e^(rT), and the standard short-rate models (Vasicek, CIR, Ho-Lee/Hull-White) differ in mean reversion, whether rates can go negative, and whether they fit the initial curve exactly.", probs:[
      {id:"portfolio_opt", title:"Portfolio optimization", statement:"State the mean–variance objective and the intuition behind the efficient frontier and the tangency (market) portfolio.", hint:"Trade off expected return against variance; the Sharpe-maximizing portfolio is the tangency point.", solution:"Maximize expected return for a given variance (or maximize μ − (λ/2)σ²). The efficient frontier is the set of minimum-variance portfolios per return level; adding a risk-free asset, the best risky mix is the tangency portfolio (max Sharpe ratio). Investors then split between it and cash — the two-fund separation theorem."},
      {id:"var", title:"Value at risk", statement:"Define Value at Risk (VaR) and note one major weakness. How does Expected Shortfall fix it?", hint:"VaR is a quantile of the loss distribution.", solution:"VaR at level α is the loss threshold exceeded with probability α (e.g., 1-day 99% VaR). Weakness: it says nothing about the size of losses beyond it and isn't sub-additive (can penalize diversification). Expected Shortfall (CVaR) — the average loss beyond VaR — is coherent and captures tail severity."},
      {id:"duration_convexity", title:"Duration and convexity", statement:"Define a bond's duration and convexity and explain how each is used to approximate price changes from yield moves.", hint:"Duration is the first-order sensitivity; convexity is the second-order correction.", solution:"Duration (modified) = −(1/P)(dP/dy): the first-order percentage price drop per unit yield rise. Convexity = (1/P)(d²P/dy²) corrects the estimate for larger moves: ΔP/P ≈ −D·Δy + ½·Convexity·(Δy)². Positive convexity means the linear duration estimate understates gains and overstates losses."},
      {id:"forward_futures", title:"Forward and futures", statement:"Derive the fair forward price of a non-dividend stock and explain why futures and forwards can differ.", hint:"Cash-and-carry: borrow to buy the stock now, deliver later.", solution:"F = S·e^{rT} by cash-and-carry no-arbitrage (borrow S, buy stock, deliver at T). Futures differ from forwards mainly due to daily marking-to-market: when rates correlate with the asset, the interim cash flows create a small convexity difference. With deterministic rates they're equal."},
      {id:"interest_rate_models", title:"Interest rate models", statement:"Name the key short-rate models and the one property that distinguishes them (e.g., Vasicek vs CIR vs Ho–Lee).", hint:"Mean reversion and whether rates can go negative.", solution:"Vasicek: mean-reverting, Gaussian short rate (can go negative). CIR: mean-reverting with √r diffusion, keeping rates non-negative. Ho–Lee/Hull–White: no-arbitrage models calibrated to fit the initial term structure exactly. The distinguishing features are mean reversion, tractability, and sign constraints on rates."}
    ]}
  ]
},
{
  id:"ch7", num:"7", title:"Algorithms and Numerical Methods",
  blurb:"The last chapter is where math meets the machine. Interviewers probe clean algorithmic thinking (complexity, in-place tricks, recursion), bit-level cleverness with powers of two, and the numerical methods that actually price things when formulas run out: Monte Carlo simulation and finite-difference PDE solvers. Aim for correct, efficient, and clearly explained — state the complexity of every solution.",
  subs:[
    { id:"7.1", title:"Algorithms", expl:"Algorithm questions reward clean, correct, efficient code, and you should state the time and space complexity of every answer. A handful of tricks recur: XOR cancels equal pairs, so it swaps two numbers without a temporary and finds the lone unpaired element in one pass; a running sum plus a ring buffer maintains a moving average in constant time per update; and Horner-s method evaluates a degree-n polynomial in n multiplications by factoring out x repeatedly. Know the sorting trade-offs (mergesort is stable and O(n log n) worst case but needs extra space, quicksort is in place and fast on average but O(n^2) worst case, heapsort is in place and O(n log n) worst case) and that comparison sorts cannot beat n log n. Fisher-Yates produces an unbiased shuffle in linear time, binary search is logarithmic but must compute the midpoint as lo + (hi-lo)/2 to avoid overflow, and Kadane-s sweep finds the maximum contiguous subarray in one pass.", probs:[
      {id:"number_swap", title:"Number swap", statement:"Swap two integer variables without using a temporary variable.", hint:"Use XOR, or arithmetic sums.", solution:"XOR trick: a ^= b; b ^= a; a ^= b. (Or a=a+b; b=a−b; a=a−b, which risks overflow.) After the three XORs the values are exchanged with no temp storage."},
      {id:"unique_elements", title:"Unique elements", statement:"An array has every element appearing twice except one that appears once. Find the lone element in O(n) time and O(1) space.", hint:"XOR is its own inverse.", solution:"XOR all elements together. Pairs cancel (x^x=0), leaving the unique value. O(n) time, O(1) space."},
      {id:"horners", title:"Horner's algorithm", statement:"Evaluate a polynomial a₀+a₁x+…+aₙxⁿ efficiently. How many multiplications does Horner's method use?", hint:"Factor out x repeatedly: (((aₙx+aₙ₋₁)x+…)).", solution:"n multiplications and n additions. Rewrite as (((aₙ)x + aₙ₋₁)x + … )x + a₀, evaluating inside-out. This beats naive term-by-term evaluation (which is O(n²) if powers are recomputed)."},
      {id:"moving_average", title:"Moving average", statement:"Maintain the average of the last k numbers in a stream in O(1) per update.", hint:"Keep a running sum and a circular buffer.", solution:"Keep a running sum and a queue/circular buffer of the last k values. On each new value: sum += new − oldest; drop oldest; average = sum/k. O(1) time per update, O(k) space."},
      {id:"sorting_algorithm", title:"Sorting algorithm", statement:"Compare the time complexities of quicksort, mergesort, and heapsort, and state which is stable and which sorts in place.", hint:"Average vs worst case; extra memory.", solution:"Mergesort: O(n log n) worst case, stable, needs O(n) extra space. Quicksort: O(n log n) average but O(n²) worst, in place, not stable. Heapsort: O(n log n) worst, in place, not stable. Comparison sorts can't beat O(n log n) in the worst case."},
      {id:"random_permutation", title:"Random permutation", statement:"Generate a uniformly random permutation of n elements in O(n).", hint:"Fisher–Yates: swap each position with a random later (or any) index.", solution:"Fisher–Yates shuffle: for i from n−1 down to 1, pick j uniform in [0,i] and swap a[i],a[j]. Every one of the n! permutations is equally likely, in O(n) time. (Naively sorting by random keys is O(n log n) and error-prone.)"},
      {id:"search_algorithm", title:"Search algorithm", statement:"You have a sorted array. Describe binary search and its complexity, and one subtle bug to avoid.", hint:"Mid computation can overflow; loop invariant matters.", solution:"Binary search halves the interval each step: O(log n). Compute mid as lo + (hi−lo)/2 to avoid integer overflow (not (lo+hi)/2). Maintain a clear invariant on which side the target must be, and be careful with the loop termination condition to avoid off-by-one/infinite loops."},
      {id:"fibonacci", title:"Fibonacci numbers", statement:"Compute the n-th Fibonacci number. Give an O(n) method and mention an O(log n) one.", hint:"Iterate with two variables; or use matrix exponentiation.", solution:"Iterative: keep the last two values, loop n times — O(n) time, O(1) space (naive recursion is exponential). O(log n): raise the matrix [[1,1],[1,0]] to the n-th power by fast exponentiation; its top-left entry is F(n)."},
      {id:"max_subarray", title:"Maximum contiguous subarray", statement:"Find the maximum-sum contiguous subarray in O(n) (Kadane's algorithm).", hint:"Track the best sum ending here and the best overall.", solution:"Kadane: sweep left to right, keeping cur = max(x, cur + x) (best sum ending at this element) and best = max(best, cur). O(n) time, O(1) space. Reset cur to the current element whenever the running sum turns negative."}
    ]},
    { id:"7.2", title:"The Power of Two", expl:"Thinking in binary unlocks a class of counting and encoding puzzles. A power of two has exactly one set bit, so n and (n-1) share no bits and n & (n-1) == 0 tests it in one operation. Shifts stand in for multiplication and division by powers of two, and combinations of shifts and additions build other multipliers, as in n*7 = (n << 3) - n. Three fair coin flips generate a uniform number from 0 to 7, so rejecting one outcome simulates a fair 1-to-7 die. The unifying idea behind the minimum-testers problems is that each yes/no test is one bit: labeling 1000 wine bottles in 10-bit binary lets 10 prisoners identify the poisoned one, since the set of prisoners who react spells out its number. Whenever a question asks for the minimum number of tests or questions, count how many bits you need.", probs:[
      {id:"power_of_2", title:"Power of 2?", statement:"Determine whether a positive integer n is a power of two using a single bitwise operation.", hint:"A power of two has exactly one set bit.", solution:"n is a power of two iff n>0 and (n & (n−1)) == 0. Subtracting 1 flips the single set bit and all lower zeros; ANDing gives 0 only when there was exactly one set bit."},
      {id:"mult_by_7", title:"Multiplication by 7", statement:"Multiply an integer by 7 using only shifts and subtraction/addition.", hint:"7 = 8 − 1.", solution:"n*7 = (n << 3) − n. Shifting left by 3 multiplies by 8; subtract n to get 7n. Bit tricks like this avoid a general multiply."},
      {id:"prob_simulation", title:"Probability simulation", statement:"Using only a fair coin, simulate a uniform random integer from 1 to 7.", hint:"Three flips give 8 outcomes; reject one.", solution:"Flip 3 times to get a 3-bit number 0–7. If it's 0–6, output value+1 (1–7); if it's 7, reject and repeat. Each accepted outcome is equally likely; expected flips = 3·(8/7) ≈ 3.43."},
      {id:"poisonous_wine", title:"Poisonous wine", statement:"A king has 1000 bottles of wine; exactly one is poisoned and kills after ~1 hour. Using prisoners as testers with results in one hour, what's the minimum number of prisoners to find the poisoned bottle?", hint:"Each prisoner is one bit; 2^n bottles need n prisoners.", solution:"10 prisoners. Number the bottles 0–999 in 10-bit binary. Prisoner i drinks from every bottle whose i-th bit is 1. After an hour, the set of prisoners who die spells out the poisoned bottle's number in binary. Since 2¹⁰ = 1024 ≥ 1000, 10 prisoners suffice."}
    ]},
    { id:"7.3", title:"Numerical Methods", expl:"When closed-form formulas run out, you either simulate or discretize. Monte Carlo prices a derivative by drawing many terminal states under the risk-neutral measure, using S_T = S_0 exp((r - sigma^2/2)T + sigma sqrt(T) Z), averaging the discounted payoffs, and reporting that average as the price; its standard error shrinks like 1 over sqrt(N), so cutting error in half costs four times the paths, which is why variance-reduction methods like antithetic variates and control variates matter. Finite-difference methods instead lay a grid over price and time, approximate the derivatives in the Black-Scholes PDE, and march backward from the known payoff at expiry. Explicit schemes are simple but only stable under a step-size condition, while implicit and Crank-Nicolson schemes solve a linear system each step but are unconditionally stable and more accurate. Choose simulation for high dimensions and path-dependence, and grids for low-dimensional problems with early exercise.", probs:[
      {id:"monte_carlo", title:"Monte Carlo simulation", statement:"Explain how Monte Carlo prices a European option and how the error scales with the number of paths.", hint:"Average discounted payoffs over simulated terminal prices; error ~ 1/√N.", solution:"Simulate many terminal stock prices under the risk-neutral measure (S_T = S₀ e^{(r−σ²/2)T + σ√T·Z}), average the discounted payoffs, and that average estimates the price. The standard error shrinks as σ/√N, so cutting error in half needs 4× the paths. Variance-reduction (antithetic, control variates) improves efficiency."},
      {id:"finite_difference", title:"Finite difference method", statement:"Describe how a finite-difference scheme solves the Black–Scholes PDE, and contrast explicit vs implicit schemes.", hint:"Discretize the S–t grid; explicit is simple but conditionally stable.", solution:"Lay a grid over stock price and time, approximate the derivatives in the BS PDE with finite differences, and march backward from the known payoff at expiry. Explicit schemes are easy but only stable under a step-size condition; implicit (and Crank–Nicolson) schemes solve a linear system each step but are unconditionally stable and more accurate. Boundary conditions come from the payoff at extreme prices."}
    ]}
  ]
}
];
/* ================= APP ENGINE ================= */
"use strict";

// ---- progress (in-memory + best-effort localStorage) ----
const PROG = (function(){
  let s = {};
  try{ const raw = localStorage.getItem("gbterm_progress"); if(raw) s = JSON.parse(raw)||{}; }catch(e){}
  return {
    get:id=>s[id]||null,
    set:(id,v)=>{ s[id]=v; try{ localStorage.setItem("gbterm_progress",JSON.stringify(s)); }catch(e){} },
    all:()=>s
  };
})();

// ---- flatten problems for search / nav ----
const FLAT=[]; // {chap, sub, prob, idx}
CHAPTERS.forEach(c=>c.subs.forEach(sub=>sub.probs.forEach(p=>{
  FLAT.push({chap:c, sub:sub, prob:p});
})));
const TOTAL = FLAT.length;
function findFlat(pid){ return FLAT.findIndex(f=>f.prob.id===pid); }

// ---- helpers ----
const $ = sel => document.querySelector(sel);
const app = $("#app");
function esc(s){ return (s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }

function statusOf(pid){ const p=PROG.get(pid); return p?p.status:null; }
function chapProgress(c){
  let done=0,total=0;
  c.subs.forEach(s=>s.probs.forEach(p=>{total++; if(statusOf(p.id)==="solved")done++;}));
  return {done,total};
}
function totalSolved(){ return FLAT.filter(f=>statusOf(f.prob.id)==="solved").length; }
function refreshProgHeader(){ $("#fkProg").innerHTML="<b>PROG</b> "+totalSolved()+"/"+TOTAL+" SOLVED"; }

// ---- routing ----
let state={view:"home", chap:null, prob:null};
function go(view,opts={}){ state=Object.assign({view},opts); render(); window.scrollTo(0,0); }

// ---- render dispatch ----
function render(){
  refreshProgHeader();
  if(state.view==="home") return renderHome();
  if(state.view==="chapter") return renderChapter(state.chap);
  if(state.view==="problem") return renderProblem(state.prob);
  if(state.view==="help") return renderHelp();
}

// ---- HOME / shelf ----
function renderHome(){
  const solved=totalSolved();
  let cards="";
  CHAPTERS.forEach(c=>{
    const pr=chapProgress(c);
    const pct= pr.total? Math.round(100*pr.done/pr.total):0;
    cards+=`<div class="chapcard" data-chap="${c.id}">
      <div class="hd"><div class="cno">${c.num}</div><div class="cttl">${esc(c.title)}</div></div>
      <div class="meta"><span>${c.subs.length} SECTIONS · ${pr.total} PROBLEMS</span><span>${pct}%</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>`;
  });
  app.innerHTML=`
    <div class="prompt">> LOADING <b>QUANT.INTERVIEW.TRAINER</b> :: 7 CHAPTERS · 33 SECTIONS · ${TOTAL} PROBLEMS · ${solved} SOLVED</div>
    <div class="panel"><div class="ttl">TABLE OF CONTENTS <span class="r">SELECT CHAPTER &lt;GO&gt;</span></div>
      <div class="body"><div class="grid7">${cards}</div></div>
    </div>
    <div class="panel"><div class="ttl">TERMINAL NOTES</div><div class="body blurb">
Navigate like the book: <b style="color:var(--amber)">Chapter → Section → Problem</b>. Each chapter opens with a concept brief. Under every section, open a problem to read it, work it in the <span style="color:var(--amber)">CLAUDE TUTOR</span> chat, submit an answer, and reveal the full solution. Use the <span style="color:var(--amber)">CMD</span> line up top to jump anywhere — try <span style="color:var(--cyan)">monty</span>, <span style="color:var(--cyan)">4.3</span>, or <span style="color:var(--cyan)">pirates</span>.
    </div></div>
    <div class="foot">GREEN BOOK TERMINAL · an interactive trainer after <b>A Practical Guide to Quantitative Finance Interviews</b> (Xinfeng Zhou).<br>Problem statements & solutions are original restatements of classic problems. Tutor replies come from Claude.</div>`;
  app.querySelectorAll(".chapcard").forEach(cd=>cd.onclick=()=>go("chapter",{chap:cd.dataset.chap}));
}

// ---- CHAPTER ----
function renderChapter(chapId){
  const c=CHAPTERS.find(x=>x.id===chapId); if(!c)return renderHome();
  let secs="";
  c.subs.forEach(sub=>{
    let cards="";
    sub.probs.forEach(p=>{
      const st=statusOf(p.id);
      const cls= st==="solved"?"done": st?"attempted":"";
      const label= st==="solved"?"SOLVED": st?"OPEN":"NEW";
      cards+=`<div class="pcard ${cls}" data-prob="${p.id}"><span class="nm">${esc(p.title)}</span><span class="st">${label}</span></div>`;
    });
    secs+=`<div class="subttl"><span>${esc(sub.title)}</span><span class="code">${sub.id}</span></div>
      ${sub.expl?`<div class="explainer"><span class="lbl">▸ SECTION BRIEF</span><div class="txt">${esc(sub.expl)}</div></div>`:``}
      <div class="plist">${cards}</div>`;
  });
  app.innerHTML=`
    <div class="crumb"><a id="bk">CONTENTS</a><span class="sep">/</span><b>CH ${c.num} — ${esc(c.title.toUpperCase())}</b></div>
    <div class="panel"><div class="ttl">CHAPTER ${c.num} · ${esc(c.title.toUpperCase())} <span class="r">CONCEPT BRIEF</span></div>
      <div class="body blurb">${esc(c.blurb)}</div>
    </div>
    ${secs}
    <div class="pager"><button class="btn ghost" id="home2">&lt; CONTENTS</button><span></span></div>`;
  $("#bk").onclick=()=>go("home"); $("#home2").onclick=()=>go("home");
  app.querySelectorAll(".pcard").forEach(pc=>pc.onclick=()=>go("problem",{prob:pc.dataset.prob}));
}

// ---- PROBLEM ----
let CHAT=[]; // {role, content}
function renderProblem(pid){
  const fi=findFlat(pid); if(fi<0)return renderHome();
  const {chap,sub,prob}=FLAT[fi];
  if(!statusOf(pid)) PROG.set(pid,{status:"open"});
  CHAT=[];
  const hasHint = !!prob.hint;
  app.innerHTML=`
    <div class="crumb"><a id="bkHome">CONTENTS</a><span class="sep">/</span>
      <a id="bkChap">CH ${chap.num} ${esc(chap.title.toUpperCase())}</a><span class="sep">/</span>
      <span style="color:var(--muted)">${sub.id} ${esc(sub.title)}</span><span class="sep">/</span><b>${esc(prob.title.toUpperCase())}</b></div>
    <div class="twocol">
      <div>
        <div class="panel"><div class="ttl">${esc(prob.title.toUpperCase())} <span class="r">${sub.id} · ${chap.num}</span></div>
          <div class="body">
            ${sub.expl?`<div class="explainer"><span class="lbl">▸ ${esc(sub.title.toUpperCase())} · ${sub.id}</span><div class="txt">${esc(sub.expl)}</div></div>`:``}
            <div class="statement">${esc(prob.statement)}</div>
            <div class="ansrow">
              <input id="ansInput" placeholder="scratch your answer / final number here…" autocomplete="off">
            </div>
            <div class="btnrow">
              ${hasHint?'<button class="btn cyan" id="hintBtn">HINT</button>':''}
              <button class="btn green" id="solveBtn">MARK SOLVED</button>
              <button class="btn" id="revealBtn">REVEAL SOLUTION</button>
            </div>
            <div id="hintSlot"></div>
            <div id="solSlot"></div>
          </div>
        </div>
        <div class="pager">
          <button class="btn ghost" id="prevBtn">&lt; PREV</button>
          <button class="btn ghost" id="nextBtn">NEXT &gt;</button>
        </div>
      </div>
      <div>
        <div class="panel"><div class="ttl">CLAUDE TUTOR <span class="r">SOCRATIC · WON'T SPOIL</span></div>
          <div class="chat">
            <div class="chatlog scroll" id="chatlog"></div>
            <div class="quickq" id="quickq">
              <button data-q="Give me a small hint to get started, but don't solve it.">NUDGE ME</button>
              <button data-q="Here's my thinking so far — is my approach on the right track?">CHECK MY APPROACH</button>
              <button data-q="What is the key insight this problem is testing?">KEY INSIGHT</button>
              <button data-q="Walk me through the full solution step by step.">FULL WALKTHROUGH</button>
            </div>
            <div class="chatin">
              <textarea id="chatText" placeholder="Ask Claude to work through it with you… (Enter to send, Shift+Enter for newline)"></textarea>
              <button id="chatSend">SEND</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  $("#bkHome").onclick=()=>go("home");
  $("#bkChap").onclick=()=>go("chapter",{chap:chap.id});
  if(hasHint) $("#hintBtn").onclick=()=>{
    $("#hintSlot").innerHTML=`<div class="hintbox"><div class="lbl">▸ HINT</div><div class="txt">${esc(prob.hint)}</div></div>`;
    $("#hintBtn").disabled=true;
  };
  $("#revealBtn").onclick=()=>{
    $("#solSlot").innerHTML=`<div class="solbox"><div class="lbl">▸ SOLUTION</div><div class="txt">${esc(prob.solution)}</div></div>`;
    if(statusOf(pid)!=="solved") PROG.set(pid,{status:"revealed"});
  };
  $("#solveBtn").onclick=()=>{ PROG.set(pid,{status:"solved"}); $("#solveBtn").textContent="✓ SOLVED"; $("#solveBtn").disabled=true; refreshProgHeader(); };
  if(statusOf(pid)==="solved"){ $("#solveBtn").textContent="✓ SOLVED"; $("#solveBtn").disabled=true; }

  $("#prevBtn").onclick=()=>{ const i=(fi-1+TOTAL)%TOTAL; go("problem",{prob:FLAT[i].prob.id}); };
  $("#nextBtn").onclick=()=>{ const i=(fi+1)%TOTAL; go("problem",{prob:FLAT[i].prob.id}); };

  // chat wiring
  const logEl=$("#chatlog");
  pushChat("sys","Tutor online. I know this problem and its solution. I'll guide with hints and check your reasoning — ask for the full walkthrough whenever you want it.");
  $("#quickq").querySelectorAll("button").forEach(b=>b.onclick=()=>{ $("#chatText").value=b.dataset.q; sendChat(prob,sub,chap); });
  $("#chatSend").onclick=()=>sendChat(prob,sub,chap);
  $("#chatText").addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendChat(prob,sub,chap);} });
  $("#ansInput").focus();
}

function pushChat(role,text){
  const logEl=$("#chatlog"); if(!logEl)return null;
  const who= role==="user"?"YOU": role==="claude"?"CLAUDE":"SYSTEM";
  const div=el(`<div class="msg ${role}"><div class="who">${who}</div><div class="txt">${esc(text)}</div></div>`);
  logEl.appendChild(div); logEl.scrollTop=logEl.scrollHeight; return div;
}

async function sendChat(prob,sub,chap){
  const ta=$("#chatText"); const sendBtn=$("#chatSend");
  const q=(ta.value||"").trim(); if(!q) return;
  ta.value=""; pushChat("user",q);
  CHAT.push({role:"user",content:q});
  const scratch=($("#ansInput")&&$("#ansInput").value.trim())||"";
  sendBtn.disabled=true;
  const thinking=pushChat("claude",""); thinking.querySelector(".txt").innerHTML='<span class="dots">thinking</span>';

  const system = `You are a sharp, encouraging quant-interview tutor embedded in a training terminal. `+
    `You are helping with this problem from chapter ${chap.num} (${chap.title}), section ${sub.id} ${sub.title}.\n\n`+
    `PROBLEM ("${prob.title}"): ${prob.statement}\n\n`+
    `KNOWN SOLUTION (for your reference — the student cannot see this unless they ask): ${prob.solution}\n\n`+
    `Tutoring rules:\n`+
    `- Default to Socratic guidance: give one small hint or a guiding question, not the whole answer.\n`+
    `- If the student shares reasoning, check it and point precisely to any flaw.\n`+
    `- If they explicitly ask for the full solution / walkthrough, give it clearly and completely, in steps.\n`+
    `- Be concise and use plain text math notation (this terminal has no LaTeX). Keep replies under ~180 words unless doing a full walkthrough.\n`+
    (scratch?`\nThe student's current scratch answer is: "${scratch}". Consider it when relevant.`:``);

  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, system, messages:CHAT })
    });
    if(!resp.ok){ throw new Error("HTTP "+resp.status); }
    const data=await resp.json();
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim() || "(no reply)";
    thinking.querySelector(".txt").textContent=text;
    CHAT.push({role:"assistant",content:text});
    $("#chatlog").scrollTop=$("#chatlog").scrollHeight;
    if(statusOf(prob.id)==="open") PROG.set(prob.id,{status:"attempted"});
  }catch(err){
    thinking.classList.remove("claude"); thinking.classList.add("sys");
    thinking.querySelector(".who").textContent="SYSTEM";
    thinking.querySelector(".txt").textContent="Tutor unreachable ("+err.message+"). The Claude tutor runs inside the Claude.ai artifact environment; if you've opened this file elsewhere the chat won't connect. You can still use HINT and REVEAL SOLUTION.";
    CHAT.pop();
  }finally{ sendBtn.disabled=false; }
}

// ---- HELP ----
function renderHelp(){
  app.innerHTML=`<div class="crumb"><a id="bk">CONTENTS</a><span class="sep">/</span><b>HELP</b></div>
  <div class="panel"><div class="ttl">HELP · GREEN BOOK TERMINAL</div><div class="body blurb">
<b style="color:var(--amber)">STRUCTURE</b>  Seven chapters mirror the book. Each opens with a concept brief; each section lists its named problems.

<b style="color:var(--amber)">A PROBLEM SCREEN</b>  Left: the problem, a scratch answer box, HINT, MARK SOLVED, and REVEAL SOLUTION. Right: the Claude tutor.

<b style="color:var(--amber)">CLAUDE TUTOR</b>  Converse to work a problem out. It's Socratic by default and won't spoil unless you ask for the full walkthrough. Use the quick buttons or type freely.

<b style="color:var(--amber)">CMD LINE</b>  Jump anywhere: a chapter number (<span style="color:var(--cyan)">3</span>), a section code (<span style="color:var(--cyan)">4.3</span>), or any word from a problem title (<span style="color:var(--cyan)">monty</span>, <span style="color:var(--cyan)">ropes</span>, <span style="color:var(--cyan)">pirates</span>).

<b style="color:var(--amber)">PROGRESS</b>  Marked-solved counts show per chapter and in the header. Saved locally in your browser when possible.
  </div></div>
  <div class="pager"><button class="btn ghost" id="home2">&lt; CONTENTS</button><span></span></div>`;
  $("#bk").onclick=()=>go("home"); $("#home2").onclick=()=>go("home");
}

// ---- command line ----
function runCommand(raw){
  const q=(raw||"").trim().toLowerCase(); if(!q)return;
  if(q==="help"||q==="f1"){ go("help"); return; }
  if(q==="home"||q==="contents"||q==="f2"){ go("home"); return; }
  // section code like 4.3
  let m=q.match(/^(\d)\.(\d)$/);
  if(m){ const c=CHAPTERS.find(x=>x.num===m[1]); if(c){ go("chapter",{chap:c.id}); setTimeout(()=>{const node=[...document.querySelectorAll(".subttl .code")].find(n=>n.textContent===m[1]+"."+m[2]); if(node)node.scrollIntoView({behavior:"smooth",block:"start"});},60); return;} }
  // chapter number
  if(/^\d$/.test(q)){ const c=CHAPTERS.find(x=>x.num===q); if(c){ go("chapter",{chap:c.id}); return;} }
  // fuzzy title / id match
  let hit=FLAT.find(f=>f.prob.title.toLowerCase().includes(q)||f.prob.id.toLowerCase().includes(q));
  if(hit){ go("problem",{prob:hit.prob.id}); return; }
  // chapter title match
  let ch=CHAPTERS.find(c=>c.title.toLowerCase().includes(q));
  if(ch){ go("chapter",{chap:ch.id}); return; }
  flashCmd("NO MATCH: "+raw);
}
function flashCmd(msg){ const i=$("#cmdInput"); const old=i.value; i.value=msg; i.style.color="#ff6666"; setTimeout(()=>{i.value="";i.style.color="";},1100); }

$("#cmdInput").addEventListener("keydown",e=>{ if(e.key==="Enter"){ runCommand(e.target.value); e.target.value=""; }});
$("#goHome").onclick=()=>go("home");
document.querySelectorAll(".fkey").forEach(fk=>{ if(/HELP/.test(fk.textContent))fk.onclick=()=>go("help"); if(/CONTENTS/.test(fk.textContent))fk.onclick=()=>go("home"); fk.style.cursor="pointer";});

// ---- clock ----
function tick(){ const d=new Date(); const p=n=>String(n).padStart(2,"0"); $("#clock").textContent=p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds())+" ET"; }
setInterval(tick,1000); tick();

// ---- ticker (chapter headline crawl) ----
(function(){
  const items=[
    ["BRAIN TEASERS","+9 SECS"],["PROBABILITY","+42 PROB"],["STOCH CALC","+16 PROB"],
    ["FINANCE","+18 PROB"],["ALGORITHMS","+15 PROB"],["CALCULUS/LA","+18 PROB"],
    ["MONTY HALL","2/3"],["DRUNK PASSENGER","1/2"],["PIRATES","98-0-1-0-1"],["BURNING ROPES","45MIN"],
    ["POISON WINE","10 TESTERS"],["ITO","dW²=dt"],["PUT-CALL PARITY","C-P=S-Ke^-rT"],["FISHER-YATES","O(n)"]
  ];
  let html="";
  for(let k=0;k<2;k++){ items.forEach((it,idx)=>{ const dn=idx%3===0?" dn":""; html+=`<span class="${dn}">${it[0]} <b>${it[1]}</b></span>`; }); }
  $("#ticker").innerHTML=html;
})();

// ---- boot ----
render();
</script>
