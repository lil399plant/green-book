      {id:"fibonacci", title:"Fibonacci numbers", statement:"A recursive function computes Fibonacci numbers by directly returning F(n−1) + F(n−2) with base cases F(0) = 0, F(1) = 1. If computing F(n) takes 100 seconds for some large n, roughly how long does F(n+1) take? Is this algorithm any good, and what would you use instead?", hint:"The recursion's running time obeys nearly the same recurrence as Fibonacci itself — so it grows by the golden ratio per step.", solution:"About 162 seconds. The naive recursion's cost satisfies T(n) ≈ T(n−1) + T(n−2), the Fibonacci recurrence, so run time scales like the golden ratio φ ≈ 1.618 per increment: 100 × 1.618 ≈ 162 s. That exponential blow-up comes from recomputing the same subproblems astronomically many times. Fixes: iterate with two rolling variables — O(n) time, O(1) space; or use the closed form F_n = (φ^n − ψ^n)/√5; or, for O(log n), exponentiate the matrix [[1,1],[1,0]] by repeated squaring. The naive version is a textbook example of why overlapping subproblems demand memoization."},
      {id:"max_subarray", title:"Maximum contiguous subarray", statement:"An array of n numbers mixes positives and negatives. Design an algorithm to find the maximum possible sum of a contiguous subarray — the computation behind maximum run-up and drawdown in trading systems. Beat the obvious O(n²).", hint:"Sweep once, tracking the best sum of a subarray that ends at the current position; a negative running sum is dead weight.", solution:"Kadane's algorithm, O(n) time and O(1) space. Sweep left to right keeping cur = max(A[i], cur + A[i]) — the best sum ending exactly here (restarting whenever the carried sum would drag you down) — and best = max(best, cur). One pass, two variables. The O(n²) baseline computes every V(i,j) incrementally; a divide-and-conquer approach reaches O(n log n); Kadane's insight that an optimal subarray never begins after a negative prefix delivers linear time, which is why it's a favorite at trading desks (max drawdown is the same computation on negated returns)."}
    ]},
    { id:"7.2", title:"The Power of Two", expl:"Thinking in binary unlocks a class of counting and encoding puzzles. A power of two has exactly one set bit, so n and (n-1) share no bits and n & (n-1) == 0 tests it in one operation. Shifts stand in for multiplication and division by powers of two, and combinations of shifts and additions build other multipliers, as in n*7 = (n << 3) - n. Three fair coin flips generate a uniform number from 0 to 7, so rejecting one outcome simulates a fair 1-to-7 die. The unifying idea behind the minimum-testers problems is that each yes/no test is one bit: labeling 1000 wine bottles in 10-bit binary lets 10 prisoners identify the poisoned one, since the set of prisoners who react spells out its number. Whenever a question asks for the minimum number of tests or questions, count how many bits you need.", probs:[
      {id:"power_of_2", title:"Power of 2?", statement:"Determine whether a positive integer n is a power of two using a single bitwise operation.", hint:"A power of two has exactly one set bit.", solution:"n is a power of two iff n>0 and (n & (n−1)) == 0. Subtracting 1 flips the single set bit and all lower zeros; ANDing gives 0 only when there was exactly one set bit."},
      {id:"mult_by_7", title:"Multiplication by 7", statement:"Multiply an integer by 7 using only shifts and subtraction/addition.", hint:"7 = 8 − 1.", solution:"n*7 = (n << 3) − n. Shifting left by 3 multiplies by 8; subtract n to get 7n. Bit tricks like this avoid a general multiply."},
      {id:"prob_simulation", title:"Probability simulation", statement:"Using only a fair coin, design a game you win with probability exactly p, for any given p between 0 and 1 (not just nice fractions like 1/4).", hint:"Write p in binary: p = 0.p1p2p3... Each coin flip can generate one binary digit of a uniform random number — compare digit by digit.", solution:"Expand p in binary: p = p1/2 + p2/4 + p3/8 + ... Flip the coin repeatedly, treating heads as 1 and tails as 0, generating the binary digits of a uniform random number U in (0,1). Compare digits one at a time against p's digits: the first position where they differ decides — if U's digit is smaller, you win; if larger, you lose. Then P(win) = P(U < p) = p exactly. The expected number of flips is just 2, since each flip resolves the comparison with probability 1/2. Any biased-probability event can be built from fair bits this way — the reverse of the von Neumann trick."},
      {id:"poisonous_wine", title:"Poisonous wine", statement:"You have 1000 wine bottles for a party starting in 20 hours; exactly one is poisoned. The poison kills in exactly 18 hours with no earlier symptoms. You have 10 lab mice. Can you guarantee finding the bad bottle in time?", hint:"18-hour kill time means only ONE round of testing fits before the party — sequential binary search is off the table. Each mouse must therefore carry one bit of a simultaneous code.", solution:"Yes — one simultaneous round with binary labeling. Sequential halving would need 10 rounds at 18 hours each; you only have time for one. Instead number the bottles 0-999 in 10-bit binary and have mouse i sip from every bottle whose i-th bit is 1 (mixing sips is fine). Eighteen hours later, read the result: the set of dead mice spells out the poisoned bottle's number in binary — dead mouse i means bit i is 1. Since 2^10 = 1024 ≥ 1000, ten mice suffice, with two hours to spare. Each mouse's life/death is one bit; ten bits distinguish 1024 outcomes."}
    ]},
    { id:"7.3", title:"Numerical Methods", expl:"When closed-form formulas run out, you either simulate or discretize. Monte Carlo prices a derivative by drawing many terminal states under the risk-neutral measure, using S_T = S_0 exp((r - sigma^2/2)T + sigma sqrt(T) Z), averaging the discounted payoffs, and reporting that average as the price; its standard error shrinks like 1 over sqrt(N), so cutting error in half costs four times the paths, which is why variance-reduction methods like antithetic variates and control variates matter. Finite-difference methods instead lay a grid over price and time, approximate the derivatives in the Black-Scholes PDE, and march backward from the known payoff at expiry. Explicit schemes are simple but only stable under a step-size condition, while implicit and Crank-Nicolson schemes solve a linear system each step but are unconditionally stable and more accurate. Choose simulation for high dimensions and path-dependence, and grids for low-dimensional problems with early exercise.", probs:[
      {id:"monte_carlo", title:"Monte Carlo simulation", statement:"Five linked questions: (a) How do you price a European call with Monte Carlo? (b) Given only a Uniform(0,1) generator, how do you produce N(mu, sigma^2) draws? (c) Name some variance-reduction techniques. (d) With no closed-form price, how do you estimate an option's delta and gamma? (e) How would you estimate pi by simulation?", hint:"(a) simulate risk-neutral terminal prices and average discounted payoffs. (b) inverse-CDF or Box-Muller, then scale. (d) reprice at bumped spots — reuse the same random draws. (e) darts in a square around a circle.", solution:"(a) Simulate S_T = S_0·exp((r − σ²/2)T + σ√T·Z) many times, average max(S_T − K, 0), discount by e^(−rT); the estimator is unbiased and its error shrinks like 1/√M. (b) Turn uniforms into standard normals via the inverse normal CDF or Box-Muller (Z1 = √(−2 ln U1)·cos(2πU2)), then set X = μ + σZ. (c) Antithetic variates (pair each Z with −Z), control variates (subtract a correlated quantity with known mean), importance sampling, stratified/low-discrepancy sampling. (d) Finite-difference Greeks: delta ≈ [P(S+h) − P(S−h)]/2h and gamma ≈ [P(S+h) − 2P(S) + P(S−h)]/h², critically using the SAME random paths for each bump so the noise cancels. (e) Throw uniform points in the unit square; the fraction inside the quarter circle estimates π/4, so multiply by 4."},
      {id:"finite_difference", title:"Finite difference method", statement:"Briefly explain finite difference methods for derivative pricing. How does the Black-Scholes PDE become a solvable grid problem, and how do explicit and implicit schemes differ?", hint:"A change of variables turns the BSM equation into the heat equation; boundary conditions encode the specific derivative; then choose which time level the space derivatives use.", solution:"Transform the Black-Scholes-Merton PDE (via log-price and time-to-maturity substitutions) into the heat-diffusion equation, whose grid numerics are standard; different derivatives differ only in their boundary/terminal conditions. Lay a grid over x (transformed price) and τ (time to maturity), start from the known payoff at τ = 0, and step through the grid replacing derivatives with finite differences. Explicit scheme: each new value is a weighted average of three known neighbors — trivial to compute, but stable only when the time step is small enough relative to Δx². Implicit scheme: the space derivatives use the unknown new time level, so each step solves a tridiagonal linear system — more work per step but unconditionally stable. Crank-Nicolson averages the two, gaining second-order accuracy in time. Grids handle early exercise naturally (compare against intrinsic value at each node), which plain Monte Carlo cannot."}
    ]}
  ]
}
];

"use strict";

// ---- progress (in-memory + best-effort localStorage) ----
const PROG = (function(){
  let s = {};
  try{ const raw = localStorage.getItem("gbterm_progress"); if(raw) s = JSON.parse(raw)||{}; }catch(e){}
  return {
    get:id=>s[id]||null,
    set:(id,v)=>{ s[id]=v; try{ localStorage.setItem("gbterm_progress",JSON.stringify(s)); }catch(e){} },
    all:()=>s
  };
})();

// ---- flatten problems for search / nav ----
const FLAT=[]; // {chap, sub, prob, idx}
CHAPTERS.forEach(c=>c.subs.forEach(sub=>sub.probs.forEach(p=>{
  FLAT.push({chap:c, sub:sub, prob:p});
})));
const TOTAL = FLAT.length;
function findFlat(pid){ return FLAT.findIndex(f=>f.prob.id===pid); }

// ---- helpers ----
const $ = sel => document.querySelector(sel);
const app = $("#app");
function esc(s){ return (s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }

function statusOf(pid){ const p=PROG.get(pid); return p?p.status:null; }
function chapProgress(c){
  let done=0,total=0;
  c.subs.forEach(s=>s.probs.forEach(p=>{total++; if(statusOf(p.id)==="solved")done++;}));
  return {done,total};
}
function totalSolved(){ return FLAT.filter(f=>statusOf(f.prob.id)==="solved").length; }
function refreshProgHeader(){ $("#fkProg").innerHTML="<b>PROG</b> "+totalSolved()+"/"+TOTAL+" SOLVED"; }

// ---- routing ----
let state={view:"home", chap:null, prob:null};
function go(view,opts={}){ state=Object.assign({view},opts); render(); window.scrollTo(0,0); }

// ---- render dispatch ----
function render(){
  refreshProgHeader();
  if(state.view==="home") return renderHome();
  if(state.view==="chapter") return renderChapter(state.chap);
  if(state.view==="problem") return renderProblem(state.prob);
  if(state.view==="help") return renderHelp();
  if(state.view==="math") return renderMath();
}

  const c=CHAPTERS.find(x=>x.id===chapId); if(!c)return renderHome();

function pushChat(role,text){
  const logEl=$("#chatlog"); if(!logEl)return null;
  const who= role==="user"?"YOU": role==="claude"?"CLAUDE":"SYSTEM";
  const div=el(`<div class="msg ${role}"><div class="who">${who}</div><div class="txt">${esc(text)}</div></div>`);
  logEl.appendChild(div); logEl.scrollTop=logEl.scrollHeight; return div;
}

async function sendChat(prob,sub,chap){
  const ta=$("#chatText"); const sendBtn=$("#chatSend");
  const q=(ta.value||"").trim(); if(!q) return;
  ta.value=""; pushChat("user",q);
  CHAT.push({role:"user",content:q});
  const scratch=($("#ansInput")&&$("#ansInput").value.trim())||"";
  sendBtn.disabled=true;
  const thinking=pushChat("claude",""); thinking.querySelector(".txt").innerHTML='<span class="dots">thinking</span>';

  const system = `You are a sharp, encouraging quant-interview tutor embedded in a training terminal. `+
    `You are helping with this problem from chapter ${chap.num} (${chap.title}), section ${sub.id} ${sub.title}.\n\n`+
    `PROBLEM ("${prob.title}"): ${prob.statement}\n\n`+
    `KNOWN SOLUTION (for your reference — the student cannot see this unless they ask): ${prob.solution}\n\n`+
    `Tutoring rules:\n`+
    `- Default to Socratic guidance: give one small hint or a guiding question, not the whole answer.\n`+
    `- If the student shares reasoning, check it and point precisely to any flaw.\n`+
    `- If they explicitly ask for the full solution / walkthrough, give it clearly and completely, in steps.\n`+
    `- Be concise and use plain text math notation (this terminal has no LaTeX). Keep replies under ~180 words unless doing a full walkthrough.\n`+
    (scratch?`\nThe student's current scratch answer is: "${scratch}". Consider it when relevant.`:``);

  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, system, messages:CHAT })
    });
    if(!resp.ok){ throw new Error("HTTP "+resp.status); }
    const data=await resp.json();
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim() || "(no reply)";
    thinking.querySelector(".txt").textContent=text;
    CHAT.push({role:"assistant",content:text});
    $("#chatlog").scrollTop=$("#chatlog").scrollHeight;
    if(statusOf(prob.id)==="open") PROG.set(prob.id,{status:"attempted"});
  }catch(err){
    thinking.classList.remove("claude"); thinking.classList.add("sys");
    thinking.querySelector(".who").textContent="SYSTEM";
    thinking.querySelector(".txt").textContent="Tutor unreachable ("+err.message+"). The Claude tutor runs inside the Claude.ai artifact environment; if you've opened this file elsewhere the chat won't connect. You can still use HINT and REVEAL SOLUTION.";
    CHAT.pop();
  }finally{ sendBtn.disabled=false; }
}

// ---- command line ----
function runCommand(raw){
  const q=(raw||"").trim().toLowerCase(); if(!q)return;
  if(q==="help"||q==="f1"){ go("help"); return; }
  if(q==="math"||q==="mental"||q==="mental math"||q==="drill"){ go("math"); return; }
  if(q==="desk"||q==="desk math"){ MATH.group="desk"; MATH.cat=GROUPS.desk.allId; go("math"); return; }
  if(q==="home"||q==="contents"||q==="f2"){ go("home"); return; }
  // section code like 4.3
  let m=q.match(/^(\d)\.(\d)$/);
  if(m){ const c=CHAPTERS.find(x=>x.num===m[1]); if(c){ go("chapter",{chap:c.id}); setTimeout(()=>{const node=[...document.querySelectorAll(".subttl .code")].find(n=>n.textContent===m[1]+"."+m[2]); if(node)node.scrollIntoView({behavior:"smooth",block:"start"});},60); return;} }
  // chapter number
  if(/^\d$/.test(q)){ const c=CHAPTERS.find(x=>x.num===q); if(c){ go("chapter",{chap:c.id}); return;} }
  // fuzzy title / id match
  let hit=FLAT.find(f=>f.prob.title.toLowerCase().includes(q)||f.prob.id.toLowerCase().includes(q));
  if(hit){ go("problem",{prob:hit.prob.id}); return; }
  // chapter title match
  let ch=CHAPTERS.find(c=>c.title.toLowerCase().includes(q));
  if(ch){ go("chapter",{chap:ch.id}); return; }
  flashCmd("NO MATCH: "+raw);
}
function flashCmd(msg){ const i=$("#cmdInput"); const old=i.value; i.value=msg; i.style.color="#ff6666"; setTimeout(()=>{i.value="";i.style.color="";},1100); }

$("#cmdInput").addEventListener("keydown",e=>{ if(e.key==="Enter"){ runCommand(e.target.value); e.target.value=""; }});
$("#goHome").onclick=()=>go("home");
document.querySelectorAll(".fkey").forEach(fk=>{ if(/HELP/.test(fk.textContent))fk.onclick=()=>go("help"); if(/CONTENTS/.test(fk.textContent))fk.onclick=()=>go("home"); fk.style.cursor="pointer";});

// ---- global stopwatch ----
const SW = {running:false, elapsed:0, t0:0, iv:null};
function swFmt(ms){
  const t=Math.max(0,ms);
  const m=Math.floor(t/60000), s=Math.floor((t%60000)/1000), d=Math.floor((t%1000)/100);
  return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+"."+d;
}
function swDraw(){
  const now = SW.running ? SW.elapsed + (Date.now()-SW.t0) : SW.elapsed;
  const el=$("#swTime"); el.textContent=swFmt(now);
  el.classList.toggle("running", SW.running);
}
function swToggle(){
  if(SW.running){
    SW.elapsed += Date.now()-SW.t0; SW.running=false;
    clearInterval(SW.iv); SW.iv=null;
    $("#swToggle").textContent="START";
  } else {
    SW.t0=Date.now(); SW.running=true;
    SW.iv=setInterval(swDraw,100);
    $("#swToggle").textContent="STOP";
  }
  swDraw();
}
function swReset(){
  SW.elapsed=0;
  if(SW.running) SW.t0=Date.now();
  swDraw();
}
$("#swToggle").onclick=swToggle;
$("#swReset").onclick=swReset;
swDraw();

    const [m,lab]=decs[rint(0,decs.length-1)];
    const a=rint(8,200)*(m===0.125?8:4)/4; // keep answers clean-ish
    return {q:`${a} <span class="op">${lab.replace("× ","×")}</span>`, a:a*m, tol:0.005};
  }}
];
// ---- desk math categories (placeholder generators — user specs to replace) ----
const DESK_CATS = [
  {id:"eqvol", label:"EQUITY VOL", gen:()=>{
    // vol/16 rule: annualized vol -> ~1-day expected move (sqrt(252) ≈ 16)
    if(Math.random()<0.5){
      const vols=[8,16,24,32,40,48,64,80];
      const v=vols[rint(0,vols.length-1)];
      return {q:`Stock runs <span class="op">${v}%</span> annualized vol. <span style="font-size:16px;color:var(--muted)">approx 1-day move, % (vol/16)</span>`, a:v/16, tol:0.05};
    }
    const dailies=[0.5,0.75,1,1.25,1.5,2,2.5,3];
    const d=dailies[rint(0,dailies.length-1)];
    return {q:`Stock moves <span class="op">${d}%</span> a day on average. <span style="font-size:16px;color:var(--muted)">approx annualized vol, % (×16)</span>`, a:d*16, tol:0.05};
  }},
  {id:"rates", label:"RATES", gen:()=>{
    // duration P&L: notional x duration x bp move
    const nots=[1,5,10,25,50,100], durs=[2,3,4,5,7,10], bps=[1,2,3,5,8,10];
    const N=nots[rint(0,nots.length-1)], D=durs[rint(0,durs.length-1)], bp=bps[rint(0,bps.length-1)];
    return {q:`$<span class="op">${N}M</span> notional, duration <span class="op">${D}</span>, yields move <span class="op">${bp}bp</span>. <span style="font-size:16px;color:var(--muted)">P&L in $ (N×D×Δy)</span>`, a:N*1e6*D*bp/10000, tol:0};
  }},
  {id:"fx", label:"FX", gen:()=>{
    // cross rates from two clean legs
    if(Math.random()<0.5){
      const eu=[1.05,1.1,1.15,1.2,1.25][rint(0,4)], uj=[100,110,120,130,140,150,160][rint(0,6)];
      return {q:`EURUSD <span class="op">${eu.toFixed(2)}</span>, USDJPY <span class="op">${uj}</span>. <span style="font-size:16px;color:var(--muted)">EURJPY?</span>`, a:eu*uj, tol:0.05};
    }
    const gb=[1.2,1.25,1.3,1.4][rint(0,3)], eu=[1.0,1.1,1.25][rint(0,2)];
    return {q:`GBPUSD <span class="op">${gb.toFixed(2)}</span>, EURUSD <span class="op">${eu.toFixed(2)}</span>. <span style="font-size:16px;color:var(--muted)">EURGBP? (3 dp)</span>`, a:eu/gb, tol:0.005};
  }}
];
const GROUPS = {
  arith: {label:"ARITHMETIC", cats:MATH_CATS, allId:"all",     allLabel:"ALL MIXED"},
  desk:  {label:"DESK MATH",  cats:DESK_CATS, allId:"alldesk", allLabel:"ALL DESK"}
};
function allCatsById(id){ return MATH_CATS.concat(DESK_CATS).find(c=>c.id===id); }
function rint(lo,hi){ return lo + Math.floor(Math.random()*(hi-lo+1)); }
let MATH = {group:"arith", cat:"mult2x2", cur:null, right:0, wrong:0, streak:0, best:0, times:[], t0:0};

// ---- daily-average leaderboard store ----
// shape: { catId: { "YYYY-MM-DD": {n: solvedCount, sum: totalSeconds} } }
const MATHLB = (function(){
  let s={};
  try{ const raw=localStorage.getItem("gbterm_mathlb"); if(raw) s=JSON.parse(raw)||{}; }catch(e){}
  return {
    data:s,
    save(){ try{ localStorage.setItem("gbterm_mathlb",JSON.stringify(s)); }catch(e){} }
  };
})();
const LB_MIN_QUALIFY = 5; // problems per day per category to make the board

// ---- benchmark / progress store ----
// shape: { catId: targetSecondsPerProblem } — editable in the UI, persisted locally
const BENCH_DEFAULTS = {mult2x2:8, addsub:6, fracdec:5, percent:5, squares:5, division:10, decmult:4, eqvol:5, rates:5, fx:5};
const BENCH = (function(){
  let s={};
  try{ const raw=localStorage.getItem("gbterm_bench"); if(raw) s=JSON.parse(raw)||{}; }catch(e){}
  return {
    get:id => (typeof s[id]==="number" && s[id]>0) ? s[id] : BENCH_DEFAULTS[id],
    set(id,v){ s[id]=v; try{ localStorage.setItem("gbterm_bench",JSON.stringify(s)); }catch(e){} }
  };
})();
function benchBest(catId){
  // best (lowest) qualifying daily average for this category, or null
  const q=lbDays(catId).filter(r=>r.n>=LB_MIN_QUALIFY);
  if(!q.length) return null;
  return Math.min(...q.map(r=>r.avg));
}
function benchDraw(){
  const el=$("#benchBody"); if(!el) return;
  let html="";
  GROUPS[MATH.group].cats.forEach(c=>{
    const best=benchBest(c.id);
    const target=BENCH.get(c.id);
    const hit = best!==null && best<=target;
    const pct = best===null ? 0 : Math.min(100, Math.round(100*target/best));
    html+=`<div class="benchrow">
      <div class="blabel">${c.label}</div>
      <div class="bbest ${best===null?'none':''}">${best===null?'—':best.toFixed(1)+'s'}</div>
      <div class="btarget">TGT <input type="number" min="0.5" step="0.5" value="${target}" data-bench="${c.id}"> s</div>
      <div class="bbar ${hit?'hit':''}"><i style="width:${pct}%"></i></div>
      <div class="bpct ${hit?'hit':''}">${best===null?'—':(hit?'HIT ✓':pct+'%')}</div>
    </div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll("input[data-bench]").forEach(inp=>{
    inp.onchange=()=>{ const v=parseFloat(inp.value); if(isFinite(v)&&v>0){ BENCH.set(inp.dataset.bench,v); benchDraw(); } };
  });
}
function lbToday(){
  const d=new Date(); const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
}
function lbRecord(catId, secs){
  const day=lbToday();
  const cat = MATHLB.data[catId] = MATHLB.data[catId] || {};
  const cell = cat[day] = cat[day] || {n:0, sum:0};
  cell.n++; cell.sum+=secs;
  MATHLB.save();
}
function lbDays(catId){
  // returns [{day, n, sum, avg}] for a category;
  // "all" merges arithmetic categories only, "alldesk" merges desk categories only
  const merged={};
  let ids;
  if(catId==="all") ids=MATH_CATS.map(c=>c.id);
  else if(catId==="alldesk") ids=DESK_CATS.map(c=>c.id);
  else ids=[catId];
  ids.forEach(id=>{
    const cat=MATHLB.data[id]||{};
    Object.entries(cat).forEach(([day,cell])=>{
      const m = merged[day] = merged[day] || {n:0,sum:0};
      m.n+=cell.n; m.sum+=cell.sum;
    });
  });
  return Object.entries(merged).map(([day,c])=>({day, n:c.n, sum:c.sum, avg:c.sum/c.n}));
}
function lbDraw(){
  const el=$("#lbBody"); if(!el) return;
  const today=lbToday();
  const rows=lbDays(MATH.cat);
  const qualified=rows.filter(r=>r.n>=LB_MIN_QUALIFY).sort((a,b)=>a.avg-b.avg).slice(0,10);
  let html="";
  if(!qualified.length){
    html=`<tr><td colspan="4" class="lbempty">No qualifying days yet — solve ${LB_MIN_QUALIFY}+ problems in a day to enter the board.</td></tr>`;
  } else {
    qualified.forEach((r,i)=>{
      const isToday=r.day===today;
      const medal = i===0?"🥇": i===1?"🥈": i===2?"🥉": String(i+1);
      html+=`<tr class="${isToday?'today':''}"><td class="rk">${medal}</td><td>${r.day}${isToday?' <span class="tag">TODAY</span>':''}</td><td class="num">${r.avg.toFixed(1)}s</td><td class="num">${r.n}</td></tr>`;
    });
  }
  // today's progress line if not yet qualified (or not on the board)
  const t=rows.find(r=>r.day===today);
  let note="";
  if(t && t.n<LB_MIN_QUALIFY){
    note=`Today so far: ${t.avg.toFixed(1)}s avg over ${t.n} — ${LB_MIN_QUALIFY-t.n} more to qualify.`;
  } else if(t && !qualified.some(r=>r.day===today)){
    note=`Today: ${t.avg.toFixed(1)}s avg over ${t.n} — outside the top 10.`;
  } else if(!t){
    note=`No solves recorded today in this category yet.`;
  }
  el.innerHTML=html;
  $("#lbNote").textContent=note;
}

function mathNew(){
  const g=GROUPS[MATH.group];
  const pool = MATH.cat===g.allId ? g.cats : g.cats.filter(c=>c.id===MATH.cat);
  const cat = pool.length ? pool[rint(0,pool.length-1)] : g.cats[0];
  MATH.cur = cat.gen();
  MATH.cur.catId = cat.id;
  MATH.t0 = Date.now();
  $("#mathQ").innerHTML = MATH.cur.q + " <span class='op'>=</span> ?";
  const inp=$("#mathA"); inp.value=""; inp.focus();
  $("#mathFB").textContent=""; $("#mathFB").className="mathfb";
}
function mathCheck(){
  if(!MATH.cur) return;
  const raw=($("#mathA").value||"").trim().replace(/,/g,"");
  if(raw==="") return;
  const guess=parseFloat(raw);
  const secs=((Date.now()-MATH.t0)/1000);
  const ok = isFinite(guess) && Math.abs(guess - MATH.cur.a) <= (MATH.cur.tol||0) + 1e-9;
  const fb=$("#mathFB");
  const shown = MATH.cur.tol>0 ? (Math.round(MATH.cur.a*1000)/1000) : MATH.cur.a;
  if(ok){
    MATH.right++; MATH.streak++; MATH.best=Math.max(MATH.best,MATH.streak);
    if(secs<=30){
      MATH.times.push(secs);
      lbRecord(MATH.cur.catId, secs);
      fb.textContent=`✓ CORRECT — ${shown}  (${secs.toFixed(1)}s)`;
    } else {
      fb.textContent=`✓ CORRECT — ${shown}  (${secs.toFixed(0)}s — over 30s, time disregarded)`;
    }
    fb.className="mathfb ok";
  } else {
    MATH.wrong++; MATH.streak=0;
    fb.textContent=`✗ ANSWER: ${shown}`; fb.className="mathfb bad";
  }
  mathHUD(); lbDraw(); benchDraw();
  setTimeout(mathNew, ok?650:1400);
}
function mathHUD(){
  const avg = MATH.times.length? (MATH.times.reduce((a,b)=>a+b,0)/MATH.times.length).toFixed(1)+"s" : "—";
  const total=MATH.right+MATH.wrong;
  const acc = total? Math.round(100*MATH.right/total)+"%" : "—";
  $("#mSolved").textContent=MATH.right; $("#mAcc").textContent=acc;
  $("#mStreak").textContent=MATH.streak; $("#mBest").textContent=MATH.best; $("#mAvg").textContent=avg;
}
function renderMath(){
  const g=GROUPS[MATH.group];
  if(!g.cats.some(c=>c.id===MATH.cat) && MATH.cat!==g.allId) MATH.cat=g.allId;
  let gtabs="";
  Object.entries(GROUPS).forEach(([gid,gr])=>{ gtabs+=`<button data-g="${gid}" class="${MATH.group===gid?"on":""}">${gr.label}</button>`; });
  let tabs=`<button data-c="${g.allId}" class="${MATH.cat===g.allId?"on":""}">${g.allLabel}</button>`;
  g.cats.forEach(c=>{ tabs+=`<button data-c="${c.id}" class="${MATH.cat===c.id?"on":""}">${c.label}</button>`; });
  const brief = MATH.group==="desk"
    ? `Desk mental math — the conversions traders do all day. Vol/16: annualized vol ÷ 16 ≈ 1-day move (√252 ≈ 15.9). Rates P&L: notional × duration × Δy in decimal (1bp = 0.0001). FX crosses: multiply when USD cancels across the pair (EURUSD×USDJPY), divide when it doesn't (EURUSD÷GBPUSD). <span style="color:var(--cyan)">Placeholder problem set — final specs to come.</span>`
    : `Speed arithmetic is screened at nearly every trading and quant shop — often before you ever see a brain teaser. Type your answer and hit Enter. Decimals accept 2-3 dp rounding. Useful tricks: split 2-digit products (47×83 = 47×80 + 47×3); square via (a±b)² around a round number (97² = 100² − 2·300 + 9); memorize 1/7 ≈ 0.142857, 1/8 = 0.125, 1/12 ≈ 0.0833; ×0.25 is ÷4, ×1.5 is add half.`;
  app.innerHTML=`
    <div class="crumb"><a id="bk">CONTENTS</a><span class="sep">/</span><b>MENTAL MATH</b></div>
    <div class="panel"><div class="ttl">MENTAL MATH DRILL <span class="r">NO CALCULATOR · NO PAPER</span></div>
      <div class="body">
        <div class="cattabs grouptabs" id="groupTabs">${gtabs}</div>
        <div class="cattabs" id="catTabs">${tabs}</div>
        <div class="explainer"><span class="lbl">▸ DRILL BRIEF</span><div class="txt">${brief}</div></div>
        <div class="mathq" id="mathQ"></div>
        <div class="mathin"><input id="mathA" inputmode="decimal" autocomplete="off" placeholder="answer"><button class="btn" id="mathGo">ENTER</button></div>
        <div class="mathfb" id="mathFB"></div>
        <div class="mathstats">
          <div class="mstat"><div class="v" id="mSolved">0</div><div class="l">SOLVED</div></div>
          <div class="mstat"><div class="v" id="mAcc">—</div><div class="l">ACCURACY</div></div>
          <div class="mstat"><div class="v" id="mStreak">0</div><div class="l">STREAK</div></div>
          <div class="mstat"><div class="v" id="mBest">0</div><div class="l">BEST STREAK</div></div>
          <div class="mstat"><div class="v" id="mAvg">—</div><div class="l">AVG TIME</div></div>
        </div>
      </div>
    </div>
    <div class="panel"><div class="ttl">DAILY LEADERBOARD <span class="r" id="lbCatLabel"></span></div>
      <div class="body">
        <table class="lbtable">
          <thead><tr><th class="rk">#</th><th>DAY</th><th class="num">AVG / PROBLEM</th><th class="num">SOLVED</th></tr></thead>
          <tbody id="lbBody"></tbody>
        </table>
        <div class="lbnote" id="lbNote"></div>
      </div>
    </div>
    <div class="panel"><div class="ttl">PROGRESS TO BENCHMARK <span class="r">BEST QUALIFYING DAY vs TARGET · EDIT TGT TO SET</span></div>
      <div class="body">
        <div class="benchhead"><div>MODE</div><div style="text-align:right">BEST AVG</div><div>BENCHMARK</div><div>PROGRESS</div><div style="text-align:right">STATUS</div></div>
        <div id="benchBody"></div>
        <div class="lbnote">Progress = benchmark ÷ your best qualifying daily average. Bar fills as your best day approaches the target; green means benchmark hit.</div>
      </div>
    </div>
    <div class="pager"><button class="btn ghost" id="home2">&lt; CONTENTS</button><span></span></div>`;
  $("#bk").onclick=()=>go("home"); $("#home2").onclick=()=>go("home");
  $("#groupTabs").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    if(MATH.group!==b.dataset.g){ MATH.group=b.dataset.g; MATH.cat=GROUPS[MATH.group].allId; renderMath(); }
  });
  $("#catTabs").querySelectorAll("button").forEach(b=>b.onclick=()=>{ MATH.cat=b.dataset.c; renderMath(); });
  $("#mathGo").onclick=mathCheck;
  $("#mathA").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); mathCheck(); }});
  const g2=GROUPS[MATH.group];
  const catLabel = MATH.cat===g2.allId ? g2.allLabel : (allCatsById(MATH.cat)||{label:MATH.cat}).label;
  $("#lbCatLabel").textContent = catLabel + " · BEST DAILY AVERAGES · MIN "+LB_MIN_QUALIFY+" SOLVES";
  mathHUD(); lbDraw(); benchDraw(); mathNew();
}

// ---- boot ----
render();
</script>
</body>
</html>
