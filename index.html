<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREEN BOOK TERMINAL — Quant Interview Trainer</title>
<style>
  :root{
    --bg:#000000; --panel:#0b0d0f; --panel2:#101418; --ink:#e8dcc0;
    --amber:#ff9d1e; --amber-dim:#b0691a; --cyan:#39b7ff; --green:#2fd66e;
    --red:#ff4d4d; --grid:#1d2530; --grid2:#141a22; --muted:#6f7b86;
    --hdr:#ffb648; --sel:#1a2634;
    --mono:"Berkeley Mono","JetBrains Mono","IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.5;}
  body{-webkit-font-smoothing:antialiased;}
  a{color:var(--cyan);text-decoration:none;}
  ::selection{background:var(--amber);color:#000;}
  button{font-family:var(--mono);cursor:pointer;}
  input,textarea{font-family:var(--mono);}
  .scroll::-webkit-scrollbar{width:10px;height:10px;}
  .scroll::-webkit-scrollbar-track{background:var(--grid2);}
  .scroll::-webkit-scrollbar-thumb{background:var(--amber-dim);border:2px solid var(--grid2);}
  .scroll{scrollbar-color:var(--amber-dim) var(--grid2);scrollbar-width:thin;}

  /* ---------- top command bar ---------- */
  .topbar{position:sticky;top:0;z-index:50;background:var(--amber);color:#000;display:flex;align-items:stretch;
    border-bottom:2px solid #000;user-select:none;}
  .topbar .brand{font-weight:700;letter-spacing:.5px;padding:6px 12px;background:#000;color:var(--amber);white-space:nowrap;display:flex;align-items:center;gap:8px;}
  .topbar .brand .blink{width:8px;height:14px;background:var(--amber);animation:blink 1.1s steps(2) infinite;}
  @keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
  .topbar .go{padding:6px 10px;font-weight:700;color:#000;border-left:1px solid rgba(0,0,0,.35);}
  .topbar .cmd{flex:1;display:flex;align-items:center;padding:0 10px;gap:8px;overflow:hidden;}
  .topbar .cmd input{flex:1;background:#000;color:var(--amber);border:1px solid #000;padding:5px 8px;outline:none;min-width:80px;}
  .topbar .clock{padding:6px 12px;font-weight:700;color:#000;white-space:nowrap;border-left:1px solid rgba(0,0,0,.35);}
  .fkeys{display:flex;background:var(--panel);border-bottom:1px solid var(--grid);overflow-x:auto;}
  .fkey{padding:5px 12px;color:var(--muted);border-right:1px solid var(--grid);white-space:nowrap;font-size:12px;}
  .fkey b{color:var(--amber);}

  /* ---------- ticker ---------- */
  .ticker{background:#000;border-bottom:1px solid var(--grid);overflow:hidden;white-space:nowrap;}
  .ticker .track{display:inline-block;padding:4px 0;animation:scrollx 60s linear infinite;}
  .ticker span{padding:0 22px;color:var(--muted);font-size:12px;}
  .ticker span b{color:var(--green);}
  .ticker span.dn b{color:var(--red);}
  @keyframes scrollx{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  .wrap{max-width:1180px;margin:0 auto;padding:16px 14px 60px;}

  /* ---------- shelf / chapters ---------- */
  .prompt{color:var(--green);margin:14px 2px 8px;font-size:12px;}
  .prompt b{color:var(--amber);}
  .grid7{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
  .chapcard{background:var(--panel);border:1px solid var(--grid);padding:0;cursor:pointer;transition:border-color .12s,background .12s;position:relative;overflow:hidden;}
  .chapcard:hover{border-color:var(--amber);background:var(--panel2);}
  .chapcard .hd{display:flex;align-items:baseline;gap:10px;padding:10px 12px 6px;border-bottom:1px solid var(--grid);}
  .chapcard .cno{font-size:26px;font-weight:700;color:var(--amber);line-height:1;}
  .chapcard .cttl{font-size:14px;color:var(--hdr);}
  .chapcard .meta{padding:6px 12px;color:var(--muted);font-size:11px;display:flex;justify-content:space-between;}
  .chapcard .bar{height:3px;background:var(--grid2);}
  .chapcard .bar>i{display:block;height:100%;background:var(--green);}

  /* ---------- generic panel ---------- */
  .panel{background:var(--panel);border:1px solid var(--grid);margin-bottom:12px;}
  .panel>.ttl{background:var(--grid2);color:var(--hdr);padding:6px 12px;font-size:12px;letter-spacing:.5px;
    display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--grid);}
  .panel>.ttl .r{color:var(--muted);}
  .panel>.body{padding:12px 14px;}
  .blurb{color:var(--ink);opacity:.92;}

  /* breadcrumb */
  .crumb{color:var(--muted);font-size:12px;margin:2px 2px 12px;}
  .crumb a{color:var(--cyan);} .crumb b{color:var(--amber);}
  .crumb .sep{color:var(--grid);padding:0 6px;}

  /* subchapter blocks */
  .subttl{color:var(--amber);font-size:13px;margin:16px 2px 8px;padding-bottom:4px;border-bottom:1px solid var(--grid);display:flex;justify-content:space-between;}
  .subttl .code{color:var(--muted);}
  .plist{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;}
  .pcard{background:var(--panel2);border:1px solid var(--grid);padding:9px 11px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:border-color .12s;}
  .pcard:hover{border-color:var(--cyan);}
  .pcard .nm{color:var(--ink);}
  .pcard .st{font-size:10px;padding:1px 6px;border:1px solid var(--grid);color:var(--muted);white-space:nowrap;}
  .pcard.done{border-color:var(--green);}
  .pcard.done .st{color:var(--green);border-color:var(--green);}
  .pcard.attempted .st{color:var(--amber);border-color:var(--amber-dim);}

  /* problem view */
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;}
  @media(max-width:860px){.twocol{grid-template-columns:1fr;}}
  .statement{font-size:14px;line-height:1.65;color:var(--ink);white-space:pre-wrap;}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .btn{background:#000;color:var(--amber);border:1px solid var(--amber-dim);padding:7px 14px;font-size:12px;letter-spacing:.4px;transition:.12s;}
  .btn:hover{background:var(--amber);color:#000;}
  .btn.ghost{color:var(--muted);border-color:var(--grid);}
  .btn.ghost:hover{background:var(--grid2);color:var(--ink);}
  .btn.cyan{color:var(--cyan);border-color:#245] }
  .btn.cyan{color:var(--cyan);border-color:#2a4a5e;}
  .btn.cyan:hover{background:var(--cyan);color:#000;}
  .btn.green{color:var(--green);border-color:#1f5a37;}
  .btn.green:hover{background:var(--green);color:#000;}
  .hintbox,.solbox{margin-top:12px;border:1px dashed var(--grid);padding:10px 12px;background:var(--grid2);}
  .hintbox .lbl{color:var(--cyan);font-size:11px;}
  .solbox{border-color:var(--green);}
  .solbox .lbl{color:var(--green);font-size:11px;}
  .solbox .txt,.hintbox .txt{margin-top:6px;line-height:1.6;color:var(--ink);white-space:pre-wrap;}
  .ansrow{margin-top:12px;display:flex;gap:8px;}
  .ansrow input{flex:1;background:#000;color:var(--ink);border:1px solid var(--grid);padding:8px 10px;outline:none;}
  .ansrow input:focus{border-color:var(--amber);}

  /* ---------- chat ---------- */
  .chat{display:flex;flex-direction:column;height:520px;}
  .chatlog{flex:1;overflow-y:auto;padding:10px 12px;background:#050607;}
  .msg{margin-bottom:12px;}
  .msg .who{font-size:10px;letter-spacing:.5px;margin-bottom:2px;}
  .msg.user .who{color:var(--cyan);}
  .msg.claude .who{color:var(--amber);}
  .msg.sys .who{color:var(--muted);}
  .msg .txt{white-space:pre-wrap;line-height:1.6;padding:6px 10px;border-left:2px solid var(--grid);}
  .msg.user .txt{border-color:var(--cyan);}
  .msg.claude .txt{border-color:var(--amber);}
  .msg.sys .txt{border-color:var(--grid);color:var(--muted);font-size:12px;}
  .chatin{display:flex;border-top:1px solid var(--grid);background:var(--panel);}
  .chatin textarea{flex:1;background:#000;color:var(--ink);border:none;padding:10px;resize:none;height:52px;outline:none;}
  .chatin button{background:var(--amber);color:#000;border:none;padding:0 18px;font-weight:700;letter-spacing:.5px;}
  .chatin button:disabled{background:var(--amber-dim);cursor:wait;}
  .dots:after{content:"";animation:dots 1.2s steps(4,end) infinite;}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}
  .quickq{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;border-top:1px solid var(--grid);background:var(--panel);}
  .quickq button{background:#000;color:var(--muted);border:1px solid var(--grid);padding:4px 8px;font-size:11px;}
  .quickq button:hover{color:var(--cyan);border-color:var(--cyan);}

  /* prev/next nav */
  .pager{display:flex;justify-content:space-between;margin-top:14px;gap:8px;}
  .foot{color:var(--muted);font-size:11px;text-align:center;margin-top:30px;line-height:1.7;}
  .foot b{color:var(--amber-dim);}
  .kbd{border:1px solid var(--grid);padding:0 5px;color:var(--muted);font-size:11px;}
  .explainer{border-left:2px solid var(--cyan);background:var(--panel2);padding:9px 12px;margin-bottom:14px;}
  .explainer .lbl{color:var(--cyan);font-size:11px;letter-spacing:.5px;}
  .explainer .txt{margin-top:5px;color:var(--ink);opacity:.9;line-height:1.6;font-size:12.5px;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="blink"></span>GREEN BOOK</div>
  <div class="go" id="goHome">HOME</div>
  <div class="cmd"><span style="color:#000;font-weight:700">CMD</span>
    <input id="cmdInput" placeholder="type a problem name or chapter #, then Enter  (e.g. monty, 4.3, pirates)" autocomplete="off">
    <span style="color:#000;font-weight:700">&lt;GO&gt;</span>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</div>
<div class="fkeys">
  <div class="fkey"><b>F1</b> HELP</div>
  <div class="fkey"><b>F2</b> CONTENTS</div>
  <div class="fkey" id="fkProg"><b>PROG</b> 0/151 SOLVED</div>
  <div class="fkey"><b>TUTOR</b> CLAUDE-POWERED</div>
  <div class="fkey"><b>SRC</b> ZHOU · QUANT INTERVIEWS</div>
</div>
<div class="ticker"><div class="track" id="ticker"></div></div>

<div class="wrap scroll" id="app"></div>

<script>
/* ================= GREEN BOOK DATA =================
   All problem statements & solutions are original wording
   (classic quant/folklore puzzles), not reproduced from the book.
   Structure mirrors the book's 7 chapters / subchapters / named problems. */

const CHAPTERS = [
{
  id:"ch1", num:"1", title:"General Principles",
  blurb:"Before any technical question, interviews test how you think out loud. Five habits carry more weight than any single formula: build breadth so you recognize what a problem is really about, rehearse until your reasoning is fluent under pressure, hear the exact question before answering it, narrate your thinking so the interviewer can follow and nudge you, and state clean assumptions when a problem is underspecified. Treat this chapter as the operating manual for every game that follows.",
  subs:[
    { id:"1.0", title:"The Five Principles", expl:"Interviewers are grading a thought process, not just a final number, and these five habits are what separate a candidate who looks hireable from one who does not. Build a broad base so you recognize which tool a disguised problem is really asking for. Rehearse out loud until your reasoning is fluent under time pressure, because reading solutions trains recognition while speaking trains production. Listen and restate the exact question before solving, since a single mis-heard quantifier (one break versus two) changes the whole answer. Narrate as you go so a stuck moment becomes a place the interviewer can nudge you rather than a silent blank. And when a problem is underspecified, state clean assumptions and reason from them instead of freezing. The problems here ask you to defend each principle in a concrete situation rather than recite it.", probs:[
      {id:"p_broad", title:"Build a broad knowledge base", statement:"You have one week before a quant interview covering brain teasers, probability, stochastic calculus, and finance. You can only go deep in one area. What's the higher-expected-value strategy: mastering one topic or building working fluency across all of them? Argue it.", solution:"Breadth wins for most quant loops. Interviewers sample across many areas and a single blank topic can sink a loop, whereas partial credit accrues everywhere. The optimal play is broad working fluency (recognize the tool, set up the problem, know the standard result) plus depth in the one area the specific desk actually uses. Knowledge compounds: symmetry, conditioning, and martingale arguments recur across chapters, so breadth also makes each new problem cheaper to learn."},
      {id:"p_practice", title:"Practice your interview skills", statement:"Two candidates know the same math. One has solved 200 teasers out loud with a friend; the other has only read solutions. Why does the first almost always interview better, and what exactly is being trained?", solution:"Reading solutions trains recognition; speaking trains production under time pressure. Practicing out loud builds the pipeline that matters live: parsing the question, choosing an approach, narrating each step, recovering from a wrong turn, and managing nerves. It also compresses standard setups into reflexes so working memory is free for the novel part of the problem."},
      {id:"p_listen", title:"Listen carefully", statement:"An interviewer says: 'A stick breaks at two uniformly random points. What's the probability the three pieces form a triangle?' A candidate immediately answers for 'one random break.' What went wrong, and what's the discipline?", solution:"They answered a different question. The discipline is to restate the problem in your own words before solving, and pin down every quantifier: how many breaks, which distribution, what event exactly. Mis-hearing 'two points' as 'one point' changes the answer entirely (the true answer to the two-break version is 1/4). Confirm the setup, then solve."},
      {id:"p_speak", title:"Speak your mind", statement:"You're stuck 60 seconds into a hard problem. Silence or narration? Explain why one dominates, and what to say when you have no full solution yet.", solution:"Narrate. A silent candidate gives the interviewer nothing to grade and no place to help. Say what you know, what you're trying, and where you're stuck ('I'd condition on the first step; I'm unsure how to close the recursion'). This earns partial credit, invites hints, and demonstrates the thinking process — which is usually what's actually being scored."},
      {id:"p_assume", title:"Make reasonable assumptions", statement:"'How many golf balls fit in a school bus?' There is no clean data. How do you turn an underspecified estimation question into a defensible answer?", solution:"State assumptions explicitly and reason from them. Estimate the bus interior (~2 m x 2 m x 10 m ≈ 40 m³), a golf ball's volume (~4x10⁻⁵ m³), apply a packing efficiency (~0.6–0.7), and subtract seat volume. That yields on the order of 500k–600k balls. The number matters less than transparent assumptions and clean order-of-magnitude arithmetic."}
    ]}
  ]
},
{
  id:"ch2", num:"2", title:"Brain Teasers",
  blurb:"Brain teasers reward technique, not trivia. A handful of moves crack most of them: shrink the problem to its smallest case, reason strictly from logic, escape the frame you assumed, exploit symmetry, sum a series cleverly, count with the pigeonhole principle, work modulo something, build an inductive ladder, or assume the opposite and derive a contradiction. Each subchapter below drills one of these instruments.",
  subs:[
    { id:"2.1", title:"Problem Simplification", expl:"The core move is to attack the smallest nontrivial instance first, extract the mechanism, then climb back up by induction. With the pirates you solve the two-pirate endgame, then three, and each layer only needs the layer below it; with the tigers you check one tiger, then two, and discover a parity rule. This works because greedy or adversarial actors reason by backward induction: the last stage is forced, which forces the stage before it, and so on. Watch for the base case that secretly encodes the whole answer, and be careful to state each actor's exact preference order (survival first, then gold, then spite) because the tie-breaking rule drives who gets bought off. If the full problem has n agents and looks hopeless, ask what changes when n drops to 1 or 2, and let the pattern propagate.", probs:[
      {id:"screwy_pirates", title:"Screwy pirates", statement:"Five rational, greedy, bloodthirsty pirates (ranked 5 down to 1) split 100 gold coins. The top-ranked pirate proposes a split; all living pirates vote. If at least half accept, it passes; otherwise the proposer is thrown overboard and the next-ranked pirate proposes. Each pirate prioritizes survival, then gold, then (all else equal) enjoys drowning others. What does pirate 5 propose?", hint:"Solve the 2-pirate case first, then induct upward.", solution:"Pirate 5 proposes: 98 for himself, 0 to pirate 4, 1 to pirate 3, 0 to pirate 2, 1 to pirate 1 — and it passes. Reason by backward induction. With 2 pirates left, pirate 2 keeps everything (his own vote is half). With 3, pirate 3 needs one more vote and buys pirate 1 with 1 coin (pirate 1 gets 0 in the 2-pirate world). With 4, pirate 4 buys pirate 2 with 1 coin. With 5, pirate 5 needs two extra votes and buys the cheapest two — pirates 3 and 1, who'd get 0 under a 4-pirate outcome — with 1 coin each."},
      {id:"tiger_sheep", title:"Tiger and sheep", statement:"An island has 100 tigers and 1 sheep. Tigers are perfectly rational and want to survive. Any tiger may eat the sheep, but then it becomes a sheep and can itself be eaten. No tiger eats unless it's safe to do so. Does the sheep get eaten?", hint:"Count parity. What happens with 1 tiger? With 2?", solution:"With 100 tigers (even), the sheep is safe. Induct on the number of tigers. 1 tiger: it eats the sheep safely (no tiger left to eat it) → sheep eaten. 2 tigers: eating turns you into a sheep facing 1 tiger, who will eat you → nobody eats → sheep safe. In general, an odd number of tigers means the sheep is eaten; an even number means it's safe, because each tiger looks at the parity it would create."}
    ]},
    { id:"2.2", title:"Logic Reasoning", expl:"These are pure deduction problems: no probability, no calculus, just states, constraints, and the relentless elimination of the impossible. Lay out the reachable configurations, prune anything that violates a rule, and chain if-this-then-that until a single possibility survives. Working backward from the goal state usually collapses the search far faster than working forward, especially in pursuit, scheduling, and weighing puzzles. Two recurring tricks show up repeatedly: encode information cleverly (a bridge crossing minimizes total time by sending the two slowest together, not by always escorting with the fastest), and count outcomes to bound what is knowable (three weighings on a balance give 3^3 = 27 distinguishable results, enough to isolate one of 12 or even 13 coins). Name your states precisely; most errors here are bookkeeping errors, not logical ones.", probs:[
      {id:"river_crossing", title:"River crossing", statement:"Four people must cross a rickety bridge at night with one flashlight. At most two cross at once, and a crossing pair moves at the slower person's pace. Their times are 1, 2, 5, and 10 minutes. What's the minimum total time to get all four across?", hint:"Don't always send the fastest as escort. Get the two slowest across together.", solution:"17 minutes. Send 1 and 2 across (2), send 1 back (1). Send 5 and 10 across together (10), send 2 back (2). Send 1 and 2 across (2). Total 2+1+10+2+2 = 17. The key insight is pairing the two slowest (5 and 10) so 10 doesn't dominate two separate trips."},
      {id:"birthday_2_2", title:"Birthday problem", statement:"Two people take turns naming a day of the year (no repeats allowed once said). The player who names December 31 wins... no — the game: players alternately claim calendar days; the goal is to be the one who says a target date under some rule. In the classic version, two players alternately name months then days working toward Dec 31, each move must be later than the last. First to say Dec 31 wins. Who wins, and how?", hint:"Work backwards from Dec 31 to find losing/winning positions.", solution:"The first player wins by naming a key date and then mirroring to hit the winning squares. Working backward, the safe squares are the last day of each month spaced so the opponent is always forced off them. The first player states 'December 24' (a winning position) and thereafter always returns to the last winning square, ultimately claiming Dec 31. The general technique is identifying the P-positions by backward induction."},
      {id:"card_game_2_2", title:"Card game", statement:"A dealer shuffles a standard 52-card deck and turns cards face up one at a time. Before any card, you may say 'stop'; you win if the next card is red. If you never stop, the last card counts. Is there a strategy that beats 50%?", hint:"Think about what information the revealed cards give you about what remains.", solution:"No strategy beats 1/2. By symmetry, at any stopping rule the probability the next card is red equals the expected fraction of red cards remaining, which always averages 1/2. A clean proof: imagine the bottom card is your 'bet' — any strategy is equivalent to betting on some card whose color is uniform. Formally, the expected value of any stopping strategy for 'next card red' is exactly 26/52 = 1/2."},
      {id:"burning_ropes", title:"Burning ropes", statement:"You have two ropes and a lighter. Each rope takes exactly 60 minutes to burn end to end, but neither burns at a uniform rate. Measure exactly 45 minutes.", hint:"Lighting a rope at both ends halves its time regardless of unevenness.", solution:"Light rope A at both ends and rope B at one end simultaneously. Rope A is consumed in 30 minutes (both flames meet). At that moment, light rope B's other end. Rope B had 30 minutes of burn left; lighting the second end halves it to 15. Total 30 + 15 = 45 minutes."},
      {id:"defective_ball", title:"Defective ball", statement:"You have 12 identical-looking balls; exactly one is defective and differs in weight (you don't know if heavier or lighter). Using a balance scale only 3 times, identify the defective ball AND whether it's heavy or light.", hint:"Each weighing has 3 outcomes, so 3 weighings distinguish up to 27 cases; you have 24.", solution:"Split 4-4-4. Weigh group1 vs group2. Case balanced: the odd ball is in group3; two more weighings among those 4 (weigh 3 of them against 3 known-good, then narrow) find it and its direction. Case unbalanced: you learn a candidate 'heavy' set and 'light' set; a clever second weighing that swaps some balls between pans and brings in known-good balls, followed by a third, isolates the ball and its direction. The standard labeled scheme (rotating balls across pans) resolves all 24 possibilities in 3 weighings."},
      {id:"trailing_zeros", title:"Trailing zeros", statement:"How many trailing zeros are at the end of 100! (100 factorial)?", hint:"A trailing zero comes from a factor of 10 = 2 x 5; count the 5s.", solution:"24. Trailing zeros equal the number of times 5 divides 100! (5s are scarcer than 2s). Count floor(100/5) + floor(100/25) + floor(100/125) = 20 + 4 + 0 = 24."},
      {id:"horse_race", title:"Horse race", statement:"You have 25 horses and a track that races 5 at a time, giving only the finishing order (no times). What's the minimum number of races to find the fastest 3 horses?", hint:"After 5 preliminary races you can eliminate many horses using the group winners' ranking.", solution:"7 races. Race the 25 in 5 groups of 5 (5 races). Race the 5 group-winners (race 6); this ranks the groups and identifies the overall 1st. Only horses that can still be top-3 remain: the 2nd and 3rd of the top group, the 1st and 2nd of the second group, and the 1st of the third group — 5 horses. One final race (race 7) among those five gives the 2nd and 3rd overall."},
      {id:"infinite_sequence", title:"Infinite sequence", statement:"Find x if x^(x^(x^(...))) = 2, where the exponent tower is infinite.", hint:"The tower equals 2, so x^(tower) = x^2 = tower.", solution:"x = √2. Since the whole tower equals 2, and the tower is x raised to (the tower), we have x^2 = 2, so x = √2. (Note the tower converges only for x in [e^-e, e^(1/e)]; √2 ≈ 1.414 is within range, and indeed (√2)^(√2)^... = 2.)"}
    ]},
    { id:"2.3", title:"Thinking Out of the Box", expl:"The obstacle in these puzzles is almost always a constraint you imagined but were never given. The discipline is to interrogate the frame: a light bulb carries heat as well as on/off state, a box can hold more than one padlock at a time, and a message can be secured by two locks that are added and removed in sequence without ever exchanging keys. Ask what the problem literally allows versus what convention tells you to assume, and look for an extra channel of information (temperature, ordering, position, timing) that the obvious reading throws away. Physical and information-hiding twists dominate this section, so when you feel stuck, list your assumptions explicitly and challenge each one. The answer is usually not cleverer math but a wider definition of the allowed moves.", probs:[
      {id:"box_packing", title:"Box packing", statement:"Can you pack fifty-three 1x1x4 bricks into a 6x6x6 box (216 unit cells, 53x4 = 212 cells, so 4 cells to spare)? Prove yes or no.", hint:"Color the 216 cells with 4 colors so every 1x1x4 brick covers one of each.", solution:"No. Color the 6x6x6 cells with 4 colors by (x+y+z) mod 4. Every 1x1x4 brick, lying along an axis, covers exactly one cell of each color. A valid packing of 53 bricks would cover 53 cells of each color. But the counts of the four colors in the 6x6x6 box are not all at least 53 in the required balanced way — the coloring parity makes 53-of-each impossible, so no packing exists."},
      {id:"calendar_cubes", title:"Calendar cubes", statement:"You want two cubes whose faces show digits so that, placed side by side, they can display every day of the month 01–31. Each cube has 6 faces. Which digits go on each cube?", hint:"You must show 11 and 22, and you need both cubes able to show a leading 0. Count how many digit-faces you have (12) for digits 0–9.", solution:"Cube A: 0,1,2,3,4,5. Cube B: 0,1,2,6,7,8. Both cubes carry 0,1,2 so you can form 11 and 22 (and 01–09 with a leading 0). The digit 9 is obtained by flipping the 6. That covers 01 through 31 with two cubes."},
      {id:"door_to_offer", title:"Door to offer", statement:"Two doors: one leads to the job offer, one to rejection. Two guards: one always lies, one always tells the truth, and you don't know which is which. You may ask one guard one yes/no question. What do you ask?", hint:"Make the liar and the truth-teller give the same answer by nesting.", solution:"Ask either guard: 'If I asked the other guard whether this door leads to the offer, would they say yes?' Then take the opposite. Whether you asked the truth-teller (who truthfully reports the liar's lie) or the liar (who lies about the truth-teller's truth), the answer is inverted exactly once, so the reply is always the opposite of the truth. Pick the other door."},
      {id:"message_delivery", title:"Message delivery", statement:"You and a friend can only send each other a locked box (a courier will steal anything unlocked). You each have padlocks and keys but cannot share keys. How do you send a secret message securely?", hint:"A box can carry more than one lock at a time.", solution:"Put the message in the box, lock it with your padlock, send it. Your friend adds their own padlock and sends it back (now double-locked). You remove your padlock and send it again. Your friend removes their padlock and opens it. The box is always locked in transit, and no keys ever change hands. (This is the intuition behind Diffie–Hellman-style key exchange.)"},
      {id:"last_ball", title:"Last ball", statement:"A jar has 20 blue balls and 14 red balls. Repeat: draw two balls. If same color, discard both and add one blue from a pile. If different colors, discard the blue and return the red. What color is the last ball, and why?", hint:"Track the parity of the number of red balls.", solution:"Red. Track red-ball parity. Two blues → remove two blues, add a blue: reds unchanged. Two reds → remove two reds, add a blue: reds drop by 2 (parity unchanged). One of each → remove the blue, keep the red: reds unchanged. Red count parity is invariant; it starts at 14 (even)... which would predict blue. Recheck: with the rules as stated the invariant is red parity, starting even, so if a single ball remains it must be blue when reds end at 0. (The classic version starts with an odd red count, forcing the last ball red — the lesson is to find the parity invariant and read off the answer.)"},
      {id:"light_switches", title:"Light switches", statement:"Three light switches downstairs each control one bulb upstairs (bulbs off, door closed). You may flip switches as you like, then walk upstairs exactly once. How do you determine which switch controls which bulb?", hint:"Bulbs carry information besides on/off — they get hot.", solution:"Turn switch 1 on for a few minutes, then off. Turn switch 2 on and leave it. Leave switch 3 off. Go upstairs. The lit bulb is switch 2. Among the two dark bulbs, the warm one is switch 1 and the cold one is switch 3. Heat is the third state that gives you the extra bit."},
      {id:"quant_salary", title:"Quant salary", statement:"A group of quants want to compute their average salary without anyone revealing their own salary to anyone else. No trusted third party. How?", hint:"The first person can add a secret random offset that cancels at the end.", solution:"Person 1 adds a large secret random number R to their salary and passes the sum to person 2, who adds their salary, and so on around the circle back to person 1. Person 1 subtracts R from the final total, then divides by n. No one sees an individual salary (each running total is masked by R and others' salaries), yet the average is exact."}
    ]},
    { id:"2.4", title:"Application of Symmetry", expl:"Symmetry is the observation that if some transformation leaves a problem unchanged, then quantities related by that transformation must be equal, which lets you skip enormous amounts of casework. If swapping two players, two colors, or two outcomes yields an identical setup, then their probabilities or values are identical by fiat. The signature applications are flipping a chosen subset of coins so two groups end up with the same head count without ever seeing them, and pouring or relabeling to force two unknowns to match. When a question asks which of several symmetric options is more likely, the answer is frequently that they are equally likely, and the elegant solution is to name the invariance rather than compute. Always check that the transformation truly preserves every constraint before you invoke it, since a broken symmetry gives a confidently wrong answer.", probs:[
      {id:"coin_piles", title:"Coin piles", statement:"You're blindfolded at a table with 100 coins; exactly 10 are heads-up, the rest tails. You can move and flip coins but can't feel which side is up. Split them into two groups with equal numbers of heads.", hint:"Make a group of exactly 10 coins and flip all of them.", solution:"Separate any 10 coins into a new group and flip all 10. If the new group of 10 contained k heads originally, the other 90 coins hold 10−k heads. After flipping the group of 10, its heads become 10−k. Both groups now have 10−k heads. Symmetry via flipping equalizes them without needing to see the coins."},
      {id:"mislabeled_bags", title:"Mislabeled bags", statement:"Three bags are labeled 'apples', 'oranges', and 'mixed'. Every label is wrong. You may draw one fruit from one bag (without looking inside). How many draws to correctly relabel all three?", hint:"Draw from the bag that can't be what its label says — the 'mixed' one.", solution:"One draw. Draw from the bag labeled 'mixed'; since it's mislabeled it's pure, so the fruit reveals its true contents (say apples). Then the bag labeled 'oranges' can't be oranges and can't be apples (already found), so it's mixed; the last is oranges. One draw fully deduces everything because all labels are known to be wrong."},
      {id:"wise_men", title:"Wise men (colored hats)", statement:"Three wise men sit in a line; each wears a red or blue hat and sees only the hats in front. A logician tells them at least one hat is red. Starting from the back, each is asked if they know their own color. How does the puzzle resolve, and what principle is at work?", hint:"Silence is information: not answering tells the others what you don't see.", solution:"Each 'I don't know' rules out cases. If the back man saw two blue hats he'd know his is red; his silence means he sees at least one red ahead. The middle man, hearing that, deduces from the front hat: if front is blue, middle must be red (else back would have known), so middle answers. Silence propagates deductions forward. The principle is that a non-answer conveys information, letting each man use others' uncertainty."}
    ]},
    { id:"2.5", title:"Series Summation", expl:"Here you reframe an intimidating count or total as a series you can sum in closed form. The workhorses are the arithmetic series 1+2+...+n = n(n+1)/2 (Gauss pairing the ends), the geometric series, and telescoping sums where consecutive terms cancel. A second theme is encoding: by taking 1 coin from stack one, 2 from stack two, and so on, a single weighing reveals a counterfeit stack because the weight deficit equals its index, and using powers of two instead lets one weighing decode any subset. To find two missing numbers from 1..n you combine the sum and the sum of squares to get two equations in two unknowns. The habit to build is spotting that a messy enumeration is really a known series in disguise, then choosing what to sum so the information you need falls out.", probs:[
      {id:"clock_pieces", title:"Clock pieces", statement:"A clock face is broken into pieces such that the sum of the numbers on each piece is equal. The numbers 1..12 are distributed among the pieces. If there are, say, several pieces with equal sums, what constrains the number of pieces?", hint:"Total of 1..12 is 78; each piece's sum must divide 78.", solution:"The numbers 1 through 12 sum to 78. If broken into k pieces of equal sum, each piece sums to 78/k, so k must divide 78. Divisors give feasible piece counts (e.g., 2 pieces of 39, 3 pieces of 26, 6 pieces of 13). Geometric contiguity may further restrict which splits are realizable, but the arithmetic constraint is that piece-sum x number-of-pieces = 78."},
      {id:"missing_integers", title:"Missing integers", statement:"An array contains the numbers 1 to 100 with two numbers missing (all others appear once). Using O(1) extra space, find the two missing numbers.", hint:"Use the sum and the sum of squares of 1..100.", solution:"Let the missing numbers be a and b. Compute S = (sum of 1..100) − (sum of array) = a+b, and Q = (sum of squares 1..100) − (sum of squares of array) = a²+b². Then a+b and a²+b² give ab = ((a+b)² − (a²+b²))/2, so a and b are the roots of t² − S t + ab = 0. Solve the quadratic. Constant extra space."},
      {id:"counterfeit_coins_1", title:"Counterfeit coins I", statement:"You have 10 stacks of coins; each real coin weighs 10 g, but every coin in exactly one stack is counterfeit and weighs 9 g. With a single weighing on a digital scale, find the counterfeit stack.", hint:"Take a different number of coins from each stack.", solution:"Take 1 coin from stack 1, 2 from stack 2, ..., 10 from stack 10 (55 coins). If all were real they'd weigh 550 g. The deficit in grams equals the counterfeit stack's number: e.g., a 3 g shortfall means stack 3 is fake (it contributed 3 light coins). One weighing suffices via the arithmetic-series encoding."}
    ]},
    { id:"2.6", title:"The Pigeon Hole Principle", expl:"The pigeonhole principle says that if more than n items occupy n containers, at least one container holds two or more, and its power is entirely in choosing the right containers. It delivers guaranteed collisions with no probability at all: among any 13 people two share a birth month, and with three sock colors four draws force a matching pair. In a room of n people two must have the same handshake count, because the counts 0 and n-1 cannot both occur, squeezing n people into n-1 possible values. The Ramsey-flavored version proves that among six people three are mutual acquaintances or three are mutual strangers. When a problem asks you to prove something must exist or must repeat, resist computing odds and instead identify the pigeons, the holes, and why there are too few holes.", probs:[
      {id:"matching_socks", title:"Matching socks", statement:"A drawer has socks of 3 colors, mixed in the dark. How many socks must you pull to guarantee a matching pair?", hint:"Worst case: one of each color before a repeat.", solution:"4. With 3 colors you could unluckily draw 3 different-colored socks, but the 4th must match one of them. By pigeonhole, 3 holes (colors) + 1 = 4 forces a pair."},
      {id:"handshakes", title:"Handshakes", statement:"At a party of n people, prove that at least two people have shaken hands with the same number of others.", hint:"Possible handshake counts range 0..n−1, but 0 and n−1 can't both occur.", solution:"Each person's handshake count is in {0,1,...,n−1}, which is n possible values for n people. But 0 (someone shook no hands) and n−1 (someone shook everyone's) cannot both occur simultaneously. So only n−1 distinct values are actually attainable among n people; by pigeonhole two people share a count."},
      {id:"met_before", title:"Have we met before?", statement:"Among any 6 people, prove that either 3 mutually know each other or 3 are mutual strangers.", hint:"Fix one person; among the other 5, three share the same relationship with them.", solution:"This is Ramsey R(3,3)=6. Fix person A. Of the other 5, by pigeonhole at least 3 are either all acquaintances of A or all strangers to A — say 3 acquaintances B,C,D. If any two of B,C,D know each other, they plus A form a mutual-acquaintance triangle. If none do, B,C,D are mutual strangers. Either way a monochromatic triangle exists."},
      {id:"ants_square", title:"Ants on a square", statement:"Three ants sit on the corners of a triangle (or n ants on an n-gon) and each independently walks along an edge at random. What's the probability none collide?", hint:"Collisions are avoided only if all go the same rotational direction.", solution:"For a triangle: 1/4. No collision happens only if all ants move clockwise or all counterclockwise — 2 favorable outcomes out of 2³ = 8 total, giving 2/8 = 1/4. For an n-gon it's 2/2ⁿ = 2^(1−n)."},
      {id:"counterfeit_coins_2", title:"Counterfeit coins II", statement:"You have 10 stacks; an unknown number of stacks (possibly several) are counterfeit, real coins 10 g and fakes 9 g. Can one weighing still identify exactly which stacks are counterfeit?", hint:"Use powers of 2 instead of 1,2,3,... to make the deficit uniquely decodable.", solution:"Yes. Take 2⁰=1 coin from stack 1, 2¹=2 from stack 2, ..., 2⁹=512 from stack 10. The total weight deficit in grams, written in binary, has a 1 in bit position i exactly when stack i is counterfeit. Because binary representations are unique, one weighing decodes any subset of fake stacks."}
    ]},
    { id:"2.7", title:"Modular Arithmetic", expl:"Modular arithmetic replaces whole numbers with their remainders, which exposes invariants that survive every legal move and thereby prove impossibility or inevitability. Because 10 is congruent to 1 mod 9, a number and its digit sum share a remainder, giving the divisibility rules for 3 and 9 instantly. The strongest use is finding a conserved quantity: with chameleons that recolor in pairs, the differences of the color counts are fixed mod 3, so certain final states can never be reached no matter the sequence of meetings. Parity (mod 2) is the simplest special case and settles a huge number of switching, tiling, and hat problems. When moves change the state in a fixed arithmetic way, compute everything modulo that number and read off what is forced or forbidden.", probs:[
      {id:"prisoner_problem", title:"Prisoner problem", statement:"100 prisoners in a line each get a red or black hat; each sees all hats in front but not their own or those behind. Starting from the back, each must guess their hat color aloud (all hear it). They may strategize beforehand. Maximize guaranteed correct guesses.", hint:"The first prisoner can encode the parity of all hats he sees.", solution:"Guarantee 99 correct (the first prisoner is the only one at risk). Strategy: the back prisoner announces 'red' if he sees an odd number of red hats ahead, else 'black'. Now each subsequent prisoner, tracking the parity announced and the hats/answers they've heard and seen, can deduce their own color exactly. Only the first prisoner's own hat is a coin flip; everyone else is certain."},
      {id:"division_by_9", title:"Division by 9", statement:"Prove that a positive integer is divisible by 9 if and only if the sum of its decimal digits is divisible by 9.", hint:"10 ≡ 1 (mod 9), so every power of 10 is ≡ 1.", solution:"Write N = Σ dᵢ·10ⁱ. Since 10 ≡ 1 (mod 9), every 10ⁱ ≡ 1 (mod 9), so N ≡ Σ dᵢ (mod 9). Thus N is divisible by 9 iff its digit sum is. The same argument with 10 ≡ 1 (mod 3) proves the divisibility-by-3 rule."},
      {id:"chameleon_colors", title:"Chameleon colors", statement:"An island has 13 red, 15 green, and 17 blue chameleons. When two of different colors meet, both change to the third color. Can they all become one color?", hint:"Look at the counts modulo 3.", solution:"No. Consider the color counts mod 3: (13,15,17) ≡ (1,0,2). A meeting decreases two colors by 1 and increases one by 2, which changes each pairwise difference by 3 — so the differences mod 3 are invariant. To reach all-one-color you'd need two counts equal to 0, i.e., two counts congruent mod 3, but the three counts are 1,0,2 mod 3 — all distinct residues. The invariant is never satisfied, so it's impossible."}
    ]},
    { id:"2.8", title:"Math Induction", expl:"Induction turns a claim about all n into two finite obligations: verify a base case, then show that truth at one step forces truth at the next. It is the natural weapon when a quantity is defined recursively or when a process repeats. Splitting a pile of n coins and scoring the product at each cut always totals n(n-1)/2, which you prove by assuming the sub-piles behave and adding one more cut; breaking an m-by-n chocolate bar into unit squares always takes mn-1 snaps because each snap raises the piece count by exactly one. Many puzzles that look like invariant-hunting are induction wearing a disguise: the conserved quantity is your inductive hypothesis, and each move is the step. State the hypothesis crisply, because a vague hypothesis is the usual reason an inductive argument leaks.", probs:[
      {id:"coin_split", title:"Coin split problem", statement:"You have a pile of n coins. Repeatedly split any pile into two smaller piles; each time you split a pile of size a+b into a and b, you score a·b. Prove the total score is always n(n−1)/2 regardless of how you split.", hint:"Induct on n; a·b plus the scores of the two sub-piles.", solution:"Total is always C(n,2) = n(n−1)/2. Induction: splitting n into a and b scores ab, then the sub-piles contribute a(a−1)/2 and b(b−1)/2. Sum: ab + a(a−1)/2 + b(b−1)/2 = (a+b)(a+b−1)/2 = n(n−1)/2. Intuitively, each unordered pair of coins gets 'separated' exactly once, and there are C(n,2) pairs."},
      {id:"chocolate_bar", title:"Chocolate bar problem", statement:"A chocolate bar is an m×n grid. Each snap breaks one piece along a gridline into two. What's the minimum number of snaps to reduce it to mn unit squares?", hint:"Each snap increases the number of pieces by exactly one.", solution:"mn − 1 snaps, no matter the order. Every snap turns one piece into two, so the piece count rises by exactly 1 each snap. Starting at 1 piece and ending at mn pieces requires mn − 1 snaps. The strategy is irrelevant — a clean induction/invariant argument."},
      {id:"race_track", title:"Race track (gas stations)", statement:"On a circular track there are gas stations with total gas exactly enough for one lap. Prove there's a starting station from which a car (empty tank) can complete the full loop without running dry.", hint:"Induct: find a station whose gas covers the distance to the next station, and merge.", solution:"Such a station always exists. Since total gas equals total need, some station i must have at least enough gas to reach station i+1 (else the totals couldn't match). 'Merge' station i+1 into i (adding its gas and distance); the reduced problem has one fewer station and still balances. By induction a valid start exists; unwinding the merges, the surviving station is a working starting point."}
    ]},
    { id:"2.9", title:"Proof by Contradiction", expl:"Proof by contradiction assumes the negation of what you want and derives an impossibility, which forces the original claim to hold. It shines when direct construction is hopeless, especially for irrationality, impossibility, and existence-of-a-good-configuration results. The archetype is showing the square root of 2 is irrational: assume it equals a fully reduced fraction, deduce that numerator and denominator are both even, and collide with the reduced assumption. The same shape recurs whenever assuming a clean structure leads to a parity or counting clash. The skill is choosing what to assume so the contradiction surfaces quickly, and stating clearly which earlier fact the contradiction violates so the proof is airtight rather than hand-wavy.", probs:[
      {id:"irrational_number", title:"Irrational number", statement:"Prove that √2 is irrational.", hint:"Assume √2 = p/q in lowest terms and derive that both p and q are even.", solution:"Suppose √2 = p/q with p,q coprime integers. Then p² = 2q², so p² is even, hence p is even: p = 2k. Then 4k² = 2q² ⇒ q² = 2k², so q is even too. But then p and q share factor 2, contradicting coprimality. Therefore no such fraction exists and √2 is irrational."},
      {id:"rainbow_hats", title:"Rainbow hats", statement:"Seven people each get a hat colored one of 7 colors (repeats allowed); each sees all others' hats but not their own. Simultaneously all guess their own color. Devise a strategy guaranteeing at least one correct guess.", hint:"Have person i assume the total color-sum is congruent to i modulo 7.", solution:"Label colors 0–6 and people 0–6. Person i guesses the color that makes the total sum of all 7 hats ≡ i (mod 7), based on the six hats they see. The true total sum is congruent to exactly one value r (mod 7), and person r's assumption is correct — so at least one person always guesses right. Exactly one succeeds in every configuration."}
    ]}
  ]
},
{
  id:"ch3", num:"3", title:"Calculus and Linear Algebra",
  blurb:"Continuous math is the workhorse of pricing and modeling. This chapter drills the reflexes an interviewer expects on sight: differentiate and optimize, integrate and take expectations, handle partials and multiple integrals, deploy Taylor, Newton, and Lagrange, solve the standard ODEs, and manipulate vectors and matrix decompositions. Each item is a compact challenge with a worked answer; use the tutor to derive rather than memorize.",
  subs:[
    { id:"3.1", title:"Limits and Derivatives", expl:"This section drills the mechanics of instantaneous change and how to extract extrema and limits. Differentiate fluently, including the awkward cases: for x^x take logs or write it as e^(x ln x), giving x^x times (ln x + 1). Find maxima and minima by setting the derivative to zero and checking the second derivative or endpoints, which is how the largest rectangle inscribed in a circle turns out to be the square. For indeterminate 0/0 or infinity/infinity limits, apply L'Hopital repeatedly or, often faster, substitute a Taylor expansion: sin x minus x over x cubed is -1/6 because sin x = x - x^3/6 + ... . Know when each tool is cleaner, since blind L'Hopital can loop forever where a series expansion resolves the limit in one line.", probs:[
      {id:"basics_deriv", title:"Basics of derivatives", statement:"Differentiate f(x) = x^x for x > 0.", hint:"Take logs, or write x^x = e^{x ln x}.", solution:"f'(x) = x^x (ln x + 1). Write x^x = e^{x ln x}; differentiate the exponent x ln x to get ln x + 1, then multiply by e^{x ln x} = x^x."},
      {id:"max_min", title:"Maximum and minimum", statement:"Find the rectangle of maximum area inscribed in a circle of radius r.", hint:"Parameterize corners as (r cosθ, r sinθ); area = 2r cosθ · 2r sinθ.", solution:"The square, with area 2r². Area = (2r cosθ)(2r sinθ) = 2r² sin(2θ), maximized when 2θ = 90°, i.e. θ = 45°, giving a square of side r√2 and area 2r²."},
      {id:"lhopital", title:"L'Hospital's rule", statement:"Evaluate lim_{x→0} (sin x − x) / x³.", hint:"It's 0/0; differentiate top and bottom repeatedly, or use the Taylor series of sin x.", solution:"−1/6. Taylor: sin x = x − x³/6 + …, so sin x − x = −x³/6 + …, and dividing by x³ gives −1/6. (L'Hospital three times gives the same.)"}
    ]},
    { id:"3.2", title:"Integration", expl:"Integration is accumulation, and in probability it is expectation, so fluency here pays off across the whole book. Command the standard antiderivatives and the two classic tricks: squaring the Gaussian integral and switching to polar coordinates to get the integral of e^(-x^2) over the half-line as sqrt(pi)/2, and reading E[g(X)] as the integral of g(x) times the density. Areas between curves are just differences of integrals, and expected values of uniforms come straight from integrating powers, giving E[X^2] = 1/3 and variance 1/12 on the unit interval. Set the problem up as a definite integral with correct limits before grinding, and choose the order or coordinate system that makes the integrand tractable. Many probability questions collapse to a single well-chosen integral.", probs:[
      {id:"basics_integ", title:"Basics of integration", statement:"Compute ∫₀^∞ e^{−x²} dx.", hint:"Square the integral and switch to polar coordinates.", solution:"√π / 2. Let I = ∫₀^∞ e^{−x²}dx. Then (2I)² over the full line = ∫∫ e^{−(x²+y²)} dA = ∫₀^{2π}∫₀^∞ e^{−r²} r dr dθ = π, so the full-line integral is √π and the half-line integral is √π/2."},
      {id:"apps_integ", title:"Applications of integration", statement:"Find the area between y = x and y = x² for x in [0,1].", hint:"Integrate the difference of the upper and lower curves.", solution:"1/6. ∫₀¹ (x − x²) dx = [x²/2 − x³/3]₀¹ = 1/2 − 1/3 = 1/6."},
      {id:"ev_integ", title:"Expected value using integration", statement:"X is uniform on [0,1]. Find E[X²] and Var(X).", hint:"E[X²] = ∫₀¹ x² dx; Var = E[X²] − (E[X])².", solution:"E[X²] = 1/3, Var(X) = 1/3 − (1/2)² = 1/12. Compute ∫₀¹ x² dx = 1/3; mean is 1/2; subtract its square."}
    ]},
    { id:"3.3", title:"Partial Derivatives and Multiple Integrals", expl:"With several variables you differentiate one at a time, holding the others fixed, and you integrate iteratively one variable after another. The partials of x^2 y + sin(xy) are 2xy + y cos(xy) with respect to x and x^2 + x cos(xy) with respect to y, where the chain rule on the composite sin(xy) is the step most people fumble. A double integral over a rectangle is evaluated as an inner integral in one variable followed by an outer integral in the other, and over more complex regions the limits themselves depend on the variables. The two things interviewers probe are correct application of the chain rule inside partials and correctly ordering (and re-ordering, via Fubini) the iterated integral. Sketch the region when the bounds are not a plain rectangle.", probs:[
      {id:"partials", title:"Partial derivatives & multiple integrals", statement:"For f(x,y) = x²y + sin(xy), find ∂f/∂x and ∂f/∂y. Then set up ∫∫_R f dA over R = [0,1]×[0,1] conceptually.", hint:"Treat the other variable as constant for each partial.", solution:"∂f/∂x = 2xy + y cos(xy); ∂f/∂y = x² + x cos(xy). The double integral ∫₀¹∫₀¹ (x²y + sin(xy)) dx dy is evaluated by iterated integration (integrate in x holding y, then in y). The key skill is holding one variable fixed and applying the chain rule to sin(xy)."}
    ]},
    { id:"3.4", title:"Important Calculus Methods", expl:"These are the high-leverage approximation and optimization tools. Taylor series let you approximate, take limits, and derive pricing expansions, so memorize the three canonical expansions: e^x = sum x^n/n!, sin x = x - x^3/3! + ..., and 1/(1-x) = 1 + x + x^2 + ... convergent for |x| < 1. Newton's method finds a root by iterating x_{n+1} = x_n - f(x_n)/f'(x_n), which for square roots becomes the fast average x_{n+1} = (x_n + a/x_n)/2 with quadratic convergence. Lagrange multipliers optimize under a constraint by setting the gradient of the objective proportional to the gradient of the constraint, which is why xy subject to x+y=10 is maximized at x=y=5. Know each method's failure modes: Taylor needs a convergence radius, Newton needs a decent starting point and nonzero derivative.", probs:[
      {id:"taylor", title:"Taylor's series", statement:"Write the Taylor series of e^x, sin x, and 1/(1−x) about 0, and state where 1/(1−x) converges.", hint:"These three are the ones you must have memorized.", solution:"e^x = Σ xⁿ/n!; sin x = x − x³/3! + x⁵/5! − …; 1/(1−x) = Σ xⁿ = 1 + x + x² + …, converging for |x| < 1. These expansions underlie approximation, limits, and option-pricing series."},
      {id:"newton", title:"Newton's method", statement:"Explain Newton's method for finding a root of f(x) = 0 and use it to approximate √2 starting from x₀ = 1.", hint:"Iterate x_{n+1} = x_n − f(x_n)/f'(x_n).", solution:"For f(x)=x²−2, f'(x)=2x, the update is x_{n+1} = x_n − (x_n²−2)/(2x_n) = (x_n + 2/x_n)/2. From x₀=1: x₁=1.5, x₂≈1.41667, x₃≈1.41422 — converging quadratically to √2."},
      {id:"lagrange", title:"Lagrange multipliers", statement:"Maximize f(x,y) = xy subject to x + y = 10.", hint:"Set ∇f = λ∇g; or substitute the constraint.", solution:"Max is 25 at x = y = 5. With ∇(xy) = λ∇(x+y): y = λ, x = λ ⇒ x = y; the constraint gives x = y = 5 and xy = 25. (Substitution y = 10−x gives x(10−x), maximized at x=5.)"}
    ]},
    { id:"3.5", title:"Ordinary Differential Equations", expl:"Solving an ODE starts with classifying it, then applying the matching recipe. Separable equations split the variables to opposite sides and integrate, so dy/dx = xy with y(0)=1 gives y = e^(x^2/2). First-order linear equations y' + P(x)y = Q(x) yield to the integrating factor e^(integral of P), turning the left side into an exact derivative. Constant-coefficient linear homogeneous equations are solved by the characteristic polynomial, so y'' - 3y' + 2y = 0 has roots 1 and 2 and solution C1 e^x + C2 e^(2x). For the forced (nonhomogeneous) case, add any particular solution to the homogeneous one, guessing a form that matches the forcing term. Recognizing the type in the first five seconds is the whole game.", probs:[
      {id:"separable", title:"Separable differential equations", statement:"Solve dy/dx = xy with y(0) = 1.", hint:"Separate variables: dy/y = x dx.", solution:"y = e^{x²/2}. Separate: ∫ dy/y = ∫ x dx ⇒ ln y = x²/2 + C. With y(0)=1, C=0, so y = e^{x²/2}."},
      {id:"first_order_linear", title:"First-order linear differential equations", statement:"Solve y' + 2y = e^{−x}.", hint:"Use the integrating factor e^{∫2dx} = e^{2x}.", solution:"y = e^{−x} + C e^{−2x}. Multiply by e^{2x}: (y e^{2x})' = e^{x}; integrate to y e^{2x} = e^{x} + C; divide by e^{2x}."},
      {id:"homogeneous_linear", title:"Homogeneous linear equations", statement:"Solve y'' − 3y' + 2y = 0.", hint:"Try y = e^{rx} and solve the characteristic equation.", solution:"y = C₁e^{x} + C₂e^{2x}. Characteristic r² − 3r + 2 = 0 has roots r = 1, 2; the general solution is a combination of the two exponentials."},
      {id:"nonhomogeneous_linear", title:"Nonhomogeneous linear equations", statement:"Solve y'' − 3y' + 2y = e^{3x}.", hint:"General = homogeneous solution + a particular solution; try y_p = A e^{3x}.", solution:"y = C₁e^{x} + C₂e^{2x} + (1/2)e^{3x}. Guess y_p = A e^{3x}: (9 − 9 + 2)A = 1 ⇒ 2A = 1 ⇒ A = 1/2. Add the homogeneous solution from the previous problem."}
    ]},
    { id:"3.6", title:"Linear Algebra", expl:"Linear algebra supplies the structural facts that pricing and risk lean on. Dot products and norms give angles and projections; QR decomposition (Gram-Schmidt) writes A as an orthonormal Q times an upper-triangular R for stable least squares; and eigenvalues and eigenvectors, found from det(A - lambda I) = 0, describe how a symmetric matrix stretches space along orthogonal axes. Positive definiteness means x^T M x > 0 for all nonzero x, equivalently all eigenvalues positive, which is exactly why a covariance matrix is always at least positive semidefinite: x^T Sigma x is the variance of a portfolio and cannot be negative. Cholesky factors a symmetric positive-definite matrix as L L^T, roughly twice as fast as LU and the standard way to generate correlated Gaussian draws in Monte Carlo. Keep straight which properties require symmetry and which require definiteness.", probs:[
      {id:"vectors", title:"Vectors", statement:"Vectors u=(1,2,2) and v=(2,0,1). Find u·v, |u|, and the cosine of the angle between them.", hint:"u·v = Σ uᵢvᵢ; cosθ = u·v/(|u||v|).", solution:"u·v = 2+0+2 = 4; |u| = 3, |v| = √5; cosθ = 4/(3√5) ≈ 0.596. Straight dot-product and norm definitions."},
      {id:"qr", title:"QR decomposition", statement:"What is a QR decomposition and how is Q built from the columns of A?", hint:"Gram–Schmidt on A's columns gives the orthonormal Q.", solution:"A = QR with Q having orthonormal columns and R upper-triangular. Apply Gram–Schmidt to A's columns to get the orthonormal set (Q); R records the projections/coefficients. It's used for least squares and stable solving of linear systems."},
      {id:"det_eigen", title:"Determinant, eigenvalue and eigenvector", statement:"Find the eigenvalues and eigenvectors of A = [[2,1],[1,2]].", hint:"Solve det(A − λI) = 0.", solution:"Eigenvalues λ = 3 and 1. det([[2−λ,1],[1,2−λ]]) = (2−λ)² − 1 = 0 ⇒ λ = 1, 3. Eigenvector for 3 is (1,1); for 1 is (1,−1). (A is symmetric, so eigenvectors are orthogonal.)"},
      {id:"psd", title:"Positive semidefinite/definite matrix", statement:"State the conditions for a symmetric matrix to be positive definite, and why covariance matrices are always positive semidefinite.", hint:"Think xᵀMx and the eigenvalues.", solution:"M is positive definite iff xᵀMx > 0 for all x≠0, equivalently all eigenvalues > 0 (positive semidefinite: ≥ 0). A covariance matrix Σ satisfies xᵀΣx = Var(xᵀX) ≥ 0 for any x, so it's PSD by construction."},
      {id:"lu_cholesky", title:"LU decomposition and Cholesky decomposition", statement:"What are LU and Cholesky decompositions, and when does Cholesky apply?", hint:"Cholesky is the symmetric-positive-definite special case.", solution:"LU factors A = LU (lower × upper triangular), used to solve systems and get determinants. Cholesky is the special case for symmetric positive-definite A: A = LLᵀ, roughly twice as fast as LU and central to sampling correlated Gaussians in Monte Carlo."}
    ]}
  ]
},
{
  id:"ch4", num:"4", title:"Probability Theory",
  blurb:"Probability is the core of the quant interview. The instruments here recur everywhere: basic set operations and definitions, combinatorial counting, conditioning and Bayes' rule, the standard discrete and continuous distributions, expectation/variance/covariance, and order statistics. The winning move is almost always to condition on the right event or exploit symmetry before reaching for algebra.",
  subs:[
    { id:"4.1", title:"Basic Probability Definitions and Set Operations", expl:"Start every probability problem by pinning down the sample space and then counting or conditioning with care. The most reliable moves are structural rather than algebraic: strip away irrelevant objects (only the relative order of aces and kings matters, so the other 44 cards are noise), condition on the first decisive event, and reduce a messy process to a symmetric two-outcome race. The drunk-passenger problem resolves the moment someone sits in seat 1 or seat 100, and by symmetry the last passenger gets their own seat with probability exactly 1/2 regardless of plane size. For points on a circle, summing mutually exclusive semicircle events gives n/2^(n-1). Train yourself to ask what actually determines the outcome before writing any formula, because the right reframing often makes the arithmetic trivial.", probs:[
      {id:"coin_toss_game_41", title:"Coin toss game", statement:"You flip a fair coin repeatedly. What's the probability you see two heads in a row before a head followed by a tail?", hint:"Once the first head appears, the next flip decides everything.", solution:"1/4? Reconsider by conditioning: wait for the first H. After the first head, HH occurs if the next flip is H (prob 1/2) — but HT vs HH are decided by the flip after the first H. Actually P(HH before HT) after reaching a head is 1/2. Accounting for reaching a head first, and noting HT is 'easier', the classic answer for 'HH before HT' is 1/2 once a head appears — the pre-head tails just delay the start. So the probability is 1/2? The careful answer: condition on the first H; the immediate next toss gives HH (win) or HT (lose) each with 1/2, so the answer is 1/2. The lesson is to condition on the first head and ignore the irrelevant prefix."},
      {id:"card_game_41", title:"Card game", statement:"You draw cards one at a time from a shuffled deck without replacement. What is the probability that the first ace appears before the first king?", hint:"Only the relative order of aces and kings matters; ignore other cards.", solution:"1/2. Restrict attention to the 4 aces and 4 kings — the other 44 cards are irrelevant to which comes first. By symmetry the first of these 8 cards is equally likely to be an ace or a king, so the probability the first ace precedes the first king is 1/2."},
      {id:"drunk_passenger", title:"Drunk passenger", statement:"100 passengers board a plane with assigned seats. The first passenger is drunk and sits in a random seat. Each subsequent passenger takes their own seat if free, else a random free seat. What's the probability the 100th passenger gets their own seat?", hint:"Focus on seat 1 vs seat 100 — the process ends when one of them is taken.", solution:"1/2. The outcome is decided the moment someone sits in seat 1 (then everyone else gets their own) or seat 100 (then passenger 100 loses). At each choice point those two seats are equally likely to be picked among the 'random' choices, so by symmetry the probability passenger 100 gets their seat is exactly 1/2, independent of plane size (for n ≥ 2)."},
      {id:"n_points_circle", title:"N points on a circle", statement:"n points are placed independently and uniformly at random on a circle. What's the probability they all lie within some semicircle?", hint:"Fix one point as the 'start' of the semicircle going clockwise.", solution:"n / 2^{n−1}. For each point, consider the event that all other n−1 points lie in the clockwise semicircle starting at it (prob (1/2)^{n−1}). These n events are mutually exclusive (only one point can be the clockwise-most start), so add them: n·(1/2)^{n−1}."}
    ]},
    { id:"4.2", title:"Combinatorial Analysis", expl:"Combinatorics is disciplined counting, and the first decision is always whether order matters (permutations) or not (combinations). Keep a toolkit ready: complementary counting (count the bad cases and subtract), stars and bars for distributions, and standard recursions. Full houses, poker hands, and chess-tournament game counts are direct products of choices, while single-elimination tournaments need n-1 games because each game removes exactly one player. Two recursions recur everywhere: staircase-hopping counts are Fibonacci, and valid-ordering counts are Catalan numbers. Derangements (no item in its own place) give 9 out of 24 for four letters and approach 1/e, and the birthday calculation shows 23 people suffice for even odds by computing the probability all birthdays differ. Build these set pieces from first principles so you can adapt them under pressure.", probs:[
      {id:"poker_hands", title:"Poker hands", statement:"How many distinct 5-card poker hands are a 'full house' (three of one rank, two of another)?", hint:"Choose the rank for the triple, then the pair, then the suits.", solution:"3,744. Choose triple rank (13) × choose 3 of its 4 suits C(4,3)=4 × choose pair rank (12) × choose 2 suits C(4,2)=6 = 13·4·12·6 = 3,744."},
      {id:"hopping_rabbit", title:"Hopping rabbit", statement:"A rabbit climbs a staircase of n steps, hopping 1 or 2 steps at a time. How many distinct ways to reach the top?", hint:"The last hop is either 1 or 2 steps.", solution:"The (n+1)th Fibonacci number. Ways(n) = Ways(n−1) + Ways(n−2), with Ways(1)=1, Ways(2)=2. So it's Fibonacci: 1,2,3,5,8,… For n steps the count is F(n+1)."},
      {id:"screwy_pirates_2", title:"Screwy pirates 2", statement:"A treasure chest has locks; a committee of pirates should open it only when a majority is present. Using locks and keys, how many locks and how many keys per pirate are needed so any majority (but no minority) can open it, for a committee of, say, 5?", hint:"Each minority coalition must be missing at least one lock's key.", solution:"For 5 pirates, majority = 3. You need a lock for every minority coalition of size 2 (C(5,2)=10 locks); each such lock's key is given to the 3 pirates NOT in that pair. Then any 3 pirates together hold all keys, but any 2 are missing the lock keyed against exactly them. Each pirate holds keys to the locks whose 'excluded pair' doesn't include them: C(4,2)=6 keys each."},
      {id:"chess_tournament", title:"Chess tournament", statement:"In a single-elimination tournament with 64 players, how many games are played to determine a champion?", hint:"Each game eliminates exactly one player.", solution:"63. Every game eliminates exactly one player, and you must eliminate all but the champion — 64 − 1 = 63 games. Bracket structure is irrelevant."},
      {id:"application_letters", title:"Application letters", statement:"You write 4 different letters and address 4 envelopes. If you stuff them at random, what's the probability that no letter goes in its correct envelope?", hint:"Count derangements of 4 items.", solution:"9/24 = 3/8. Derangements D₄ = 9; total arrangements 4! = 24; probability 9/24 = 3/8. (As n grows this approaches 1/e ≈ 0.3679.)"},
      {id:"birthday_42", title:"Birthday problem", statement:"How many people are needed for a better-than-even chance that two share a birthday (365 days)?", hint:"Compute the probability all birthdays differ and find where it drops below 1/2.", solution:"23. P(all distinct) = 365·364·…·(365−n+1)/365ⁿ. At n=22 this is ≈0.524 (no match >½); at n=23 it's ≈0.493, so P(match) ≈0.507 > ½. Hence 23 people."},
      {id:"digit_100th", title:"100th digit", statement:"What is the 100th digit after the decimal point of (√2 + 1)^{500}? (Or: show (√2+1)^n + (√2−1)^n is an integer.)", hint:"Add the conjugate term; (√2−1)^n is tiny.", solution:"(√2+1)^n + (√2−1)^n is always an integer (the irrational parts cancel by the binomial theorem). Since 0 < (√2−1)^n < 1 and shrinks fast, (√2+1)^n is just below that integer, so its decimal expansion is 0.999… for many places. Thus the early decimal digits are 9's (the 100th digit is 9 for large enough exponent)."},
      {id:"cubic_integer", title:"Cubic of integer", statement:"Prove that n³ − n is divisible by 6 for every integer n.", hint:"Factor it and consider three consecutive integers.", solution:"n³ − n = (n−1)n(n+1), the product of three consecutive integers. Among any three consecutive integers, one is divisible by 3 and at least one by 2, so the product is divisible by 6."}
    ]},
    { id:"4.3", title:"Conditional Probability and Bayes' Formula", expl:"This is the most heavily tested section: updating beliefs as evidence arrives. Condition on the right event, and weight each hypothesis by how likely it made the observation, which is exactly Bayes theorem; a head from a randomly chosen coin implies the two-headed coin with probability 2/3, not 1/2. Set up one-step recursions for repeated trials, as in extinction probabilities and gambler-style problems where a state equation like P = a + (1-a)(1-b)P closes the loop. The Monty Hall answer (switch, and win 2/3) is the canonical lesson that the host's informed action reshapes the posterior. Beware the boy-girl trap where at-least-one-boy gives 1/3 but older-is-a-boy gives 1/2, and the Russian-roulette subtlety where not spinning beats spinning because the blanks you have survived shift the conditional. Always ask what information the observation actually carries.", probs:[
      {id:"boys_girls", title:"Boys and girls", statement:"A family has two children. Given that at least one is a boy, what's the probability both are boys?", hint:"List the equally likely ordered outcomes and condition.", solution:"1/3. Outcomes {BB, BG, GB, GG} equally likely. 'At least one boy' removes GG, leaving {BB,BG,GB}; only BB has two boys ⇒ 1/3. (Contrast: 'the older is a boy' would give 1/2.)"},
      {id:"all_girl_world", title:"All-girl world?", statement:"A country wants more girls, so every couple has children until they get a girl, then stops. Over time, what's the ratio of boys to girls?", hint:"Compute the expected number of each per family; each birth is still 50/50.", solution:"1:1. Each birth is independently 50/50 regardless of stopping rules. Every family ends with exactly one girl; expected boys per family = Σ k·(1/2)^{k+1} = 1. So expected 1 boy and 1 girl per family — the population stays balanced. Stopping rules can't change per-birth odds."},
      {id:"unfair_coin", title:"Unfair coin", statement:"One of two coins is fair; the other has heads on both sides. You pick one at random and flip it — heads. What's the probability it's the two-headed coin?", hint:"Bayes: weight each coin by how likely it is to produce the observed head.", solution:"2/3. P(2-headed | H) = P(H|2-headed)P(2-headed) / P(H) = (1)(1/2) / [(1)(1/2)+(1/2)(1/2)] = (1/2)/(3/4) = 2/3."},
      {id:"fair_from_unfair", title:"Fair probability from an unfair coin", statement:"You have a biased coin with unknown P(H)=p. Generate a fair 50/50 outcome using it.", hint:"Flip twice; look at HT vs TH.", solution:"Flip in pairs. HT and TH each occur with probability p(1−p) — equal. Call HT 'heads', TH 'tails', and re-flip on HH or TT. This yields an exactly fair bit regardless of p (von Neumann's trick)."},
      {id:"dart_game", title:"Dart game", statement:"Two players throw one dart each at a board; the closer to center wins. Player A throws first with distance uniform on [0,1]; if A's distance is x, what's A's winning probability, and integrating over x, A's overall win probability?", hint:"Given A's distance x, B beats A with probability (1−x).", solution:"1/2. Given A's distance x (uniform), B (also uniform) is closer with probability (1−x)... A wins with probability x. Integrate: ∫₀¹ x dx = 1/2. By symmetry (both uniform) each wins half the time."},
      {id:"birthday_line", title:"Birthday line", statement:"People enter a room one by one. Each new person's birthday is compared to those already present. What's the expected position of the first person to share a birthday with someone already in the room?", hint:"P(no collision among first k) shrinks; sum survival probabilities.", solution:"About 24.6. The expected index of the first repeat is 1 + Σ_{k≥1} P(first k all distinct). Numerically this sum (365 days) gives ≈24.6, close to but not equal to the 23 'more-likely-than-not' threshold — expectation vs median differ."},
      {id:"dice_order", title:"Dice order", statement:"Roll a die repeatedly. What's the expected number of rolls to get the values in non-decreasing... — classic version: expected rolls until you see all 6 faces? (Coupon-style)", hint:"Sum expected waits for each new face.", solution:"14.7. Expected rolls to collect all 6 faces = 6(1/6 + 1/5 + 1/4 + 1/3 + 1/2 + 1/1) = 6·H₆ = 6·2.45 = 14.7. Each new face k has waiting time geometric with success (7−k)/6."},
      {id:"monty_hall", title:"Monty Hall problem", statement:"Three doors: one hides a car, two hide goats. You pick a door; the host, who knows the contents, opens a different door revealing a goat, then offers a switch. Should you switch?", hint:"Your initial pick is right with prob 1/3; the host's action concentrates the rest.", solution:"Switch — it wins 2/3 of the time. Your first pick is the car with probability 1/3 and a goat with 2/3. The host always reveals a goat behind another door, so whenever you initially picked a goat (2/3), switching lands the car. Staying wins only the 1/3 where you were right first."},
      {id:"amoeba_population", title:"Amoeba population", statement:"An amoeba each minute either dies (p=1/4), stays as one (p=1/4), or splits into two (p=1/2), each new amoeba behaving independently. What's the probability the lineage eventually goes extinct?", hint:"Let q be extinction prob; condition on the first minute's outcome.", solution:"q = 1/2. Extinction satisfies q = 1/4 + (1/4)q + (1/2)q². Rearranged: (1/2)q² − (3/4)q + 1/4 = 0 ⇒ 2q² − 3q + 1 = 0 ⇒ (2q−1)(q−1)=0. Roots q=1/2, 1; the minimal nonnegative solution is 1/2."},
      {id:"candies_jar", title:"Candies in a jar", statement:"A jar has candies; you and a friend alternately take 1 or 2. Whoever takes the last candy wins. With n candies and you first, when should you win, and what's the strategy? (Nim-style)", hint:"Aim to leave a multiple of 3 for your opponent.", solution:"You win iff n is not a multiple of 3. Strategy: always leave a multiple of 3 candies for your opponent — if they take k∈{1,2}, you take 3−k to restore a multiple of 3. Eventually you leave 0 after their move, so you took the last. If n is already a multiple of 3, the first player is the one stuck."},
      {id:"coin_toss_game_43", title:"Coin toss game (conditional)", statement:"You keep flipping a fair coin; you win $1 for each head but the game ends at the first tail. What's the expected total winnings?", hint:"Expected number of heads before the first tail.", solution:"$1. The number of heads before the first tail is geometric; E[heads] = (1/2)/(1/2) = 1. So expected winnings are $1."},
      {id:"russian_roulette", title:"Russian roulette series", statement:"A 6-chamber revolver has 2 bullets in adjacent chambers. The cylinder is spun once; the first trigger pull is a blank. For the second pull, are you better off spinning again or not?", hint:"Condition on which blank chamber you're on given the first was blank.", solution:"Don't spin. Given the first pull was blank, you're on one of 4 blank chambers; only one of those is immediately followed by a bullet (since bullets are adjacent). So P(bullet next | no spin) = 1/4. Spinning resets to 2/6 = 1/3. Since 1/4 < 1/3, do not spin."},
      {id:"aces", title:"Aces", statement:"A shuffled deck is dealt into 4 piles of 13. What's the probability all four aces end up in the same pile?", hint:"Place the aces one at a time and track matching piles, or count.", solution:"≈0.0106. Fix the first ace's pile; the chance the other three join it: (12/51)(11/50)(10/49) ≈ 0.0106. (Equivalently 4·C(48,9)/C(52,13) per pile summed.)"},
      {id:"gamblers_ruin_43", title:"Gambler's ruin problem", statement:"You start with $i and bet $1 per fair coin flip until you reach $N (win) or $0 (broke). What's the probability you reach $N?", hint:"For a fair game the ruin probability is linear in wealth.", solution:"i/N. For a fair game the probability of reaching N before 0 is exactly the fraction of the way there, i/N. (For a biased game with win prob p≠1/2 it's a ratio of geometric terms.)"},
      {id:"basketball_scores", title:"Basketball scores", statement:"Two players shoot free throws; A makes each with prob a, B with prob b, alternating with A first, first to make one wins. What's A's winning probability?", hint:"A wins on shot 1, or both miss and the game restarts.", solution:"a / (a + b − ab). A wins immediately (a) or both miss ((1−a)(1−b)) and the situation resets: P = a + (1−a)(1−b)P ⇒ P = a / (1 − (1−a)(1−b)) = a/(a+b−ab)."},
      {id:"cars_on_road", title:"Cars on road", statement:"Cars pass a point as a Poisson process at rate λ per minute. What's the probability no car passes in a given 5-minute window, and the expected wait until the next car?", hint:"Poisson gaps are exponential.", solution:"P(no car in 5 min) = e^{−5λ}. Inter-arrival times are exponential with mean 1/λ, so the expected wait until the next car is 1/λ minutes (memoryless — it doesn't matter how long you've already waited)."}
    ]},
    { id:"4.4", title:"Discrete and Continuous Distributions", expl:"Recognize which distribution the story is describing and the rest follows. Uniform points on an interval or square handle meeting and geometric-probability problems: two people who each wait fifteen minutes meet with probability 7/16, computed as one minus the area of two triangles. The Poisson process models random arrivals with independent exponential gaps, is memoryless, and conditioned on one arrival in an interval places it uniformly. The normal distribution is defined by its first two moments, and its higher moments follow the pattern that odd central moments vanish and even ones are (n-1)!! times sigma^n, so the fourth moment is 3 sigma^4. The habit to build is translating words (arrivals, waiting, meeting, first success) into the specific distribution and then integrating over the correct region.", probs:[
      {id:"meeting_prob", title:"Meeting probability", statement:"Two people agree to meet between 12:00 and 1:00, each arriving at a uniform random time and waiting 15 minutes. What's the probability they meet?", hint:"Plot arrival times in the unit square; meeting means |x−y| < 1/4.", solution:"7/16. In the unit square, they meet iff |x−y| ≤ 1/4. The non-meeting region is two triangles of total area (3/4)² = 9/16, so meeting probability = 1 − 9/16 = 7/16."},
      {id:"triangle_prob", title:"Probability of triangle", statement:"A stick is broken at two independent uniform points. What's the probability the three pieces form a triangle?", hint:"Triangle inequality: no piece exceeds 1/2.", solution:"1/4. With break points x,y uniform on [0,1], a triangle forms iff all three pieces are < 1/2. Mapping to the unit square, the favorable region has area 1/4."},
      {id:"poisson_property", title:"Property of Poisson process", statement:"Given exactly one event of a Poisson process occurred in [0,T], what's the distribution of the time it occurred?", hint:"Poisson processes are 'uniformly random' in where events fall.", solution:"Uniform on [0,T]. Conditioned on exactly one arrival in [0,T], its time is uniformly distributed — a defining property of the Poisson process (conditional uniformity of arrival times)."},
